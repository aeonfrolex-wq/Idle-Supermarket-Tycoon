            ctx.beginPath(); ctx.arc(0, -17, 7, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            
            if (isPlayer) {
              ctx.fillStyle = '#1e3a8a'; 
              ctx.beginPath(); ctx.arc(0, -19, 7, Math.PI, 0); ctx.fill(); ctx.fillRect(-7, -19, 18, 3);
            } else if (isStaff) {
              ctx.fillStyle = '#166534'; 
              ctx.beginPath(); ctx.arc(0, -19, 7, Math.PI, 0); ctx.fill(); ctx.fillRect(-7, -19, 18, 3);
            } else if (isGuard) {
              ctx.fillStyle = '#020617'; 
              ctx.beginPath(); ctx.arc(0, -19, 7, Math.PI, 0); ctx.fill(); ctx.fillRect(-7, -19, 18, 3);
              ctx.fillStyle = '#eab308'; // Gold badge
              ctx.beginPath(); ctx.arc(-4, -7, 2, 0, Math.PI*2); ctx.fill();
            } else {
              ctx.fillStyle = char.hair; 
              ctx.beginPath(); ctx.arc(0, -18, 7, Math.PI, 0); ctx.fill();
            }

            if (char.isShoplifter) {
                ctx.fillStyle = '#020617';
                ctx.fillRect(-6, -20, 12, 4);
            }

            if (char.cartValue > 0) {
                ctx.fillStyle = '#cbd5e1'; ctx.fillRect(6, -14, 14, 10);
                ctx.strokeStyle = '#64748b'; ctx.strokeRect(6, -14, 14, 10);
                ctx.beginPath(); ctx.moveTo(10, -14); ctx.lineTo(10, -4); ctx.moveTo(14, -14); ctx.lineTo(14, -4); ctx.stroke();
                
                ctx.fillStyle = '#ef4444'; ctx.fillRect(8, -10, 5, 4); 
                if (char.cartValue > 100) { ctx.fillStyle = '#f59e0b'; ctx.fillRect(13, -12, 5, 6); } 
                if (char.cartValue > 500) { ctx.fillStyle = '#3b82f6'; ctx.fillRect(9, -14, 8, 4); } 

                ctx.strokeStyle = '#94a3b8'; ctx.beginPath(); ctx.moveTo(6, -14); ctx.lineTo(3, -18); ctx.stroke();
                ctx.fillStyle = '#0f172a';
                ctx.beginPath(); ctx.arc(8, -2, 2.5, 0, Math.PI*2); ctx.arc(18, -2, 2.5, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
        };

        const draw = () => {
          const ctx = canvasRef.current?.getContext('2d');
          if (!ctx) return;
          const state = gameState.current;
          const mIdx = mapIndexRef.current;
          const map = getActiveMap();
          const eCols = map.cols;
          const eRows = map.rows;
          const eEntrance = map.entrance;
          const facLevels = facilitiesRef.current[mIdx] || {};
          const camX = state.camera.x;
          const camY = state.camera.y;

          const isDark = state.timeOfDay < 8.0 || state.timeOfDay > 17.0;
          state.lights = []; 

          ctx.fillStyle = '#dbeafe'; 
          ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

          const renderQueue = [];

          for(let x=-2; x < eCols+2; x++) {
            for(let y=-2; y < eRows+12; y++) {
              renderQueue.push({
                type: 'floor', x, y, zIndex: -1000 + x + y, 
                draw: () => {
                  const p1 = toIso(map, x, y, 0, camX, camY); 
                  const p2 = toIso(map, x+1, y, 0, camX, camY); 
                  const p3 = toIso(map, x+1, y+1, 0, camX, camY); 
                  const p4 = toIso(map, x, y+1, 0, camX, camY);
                  
                  let cTop = '', cStroke = '';
                  let isParkingLine = false;

                  if (x >= 0 && x < eCols && y >= 0 && y < eRows) {
                    const isCheckout = y > eRows - 7;
                    cTop = isCheckout ? ((x+y)%2===0 ? '#e2e8f0' : '#cbd5e1') : ((x+y)%2===0 ? '#ffffff' : '#f8fafc');
                    cStroke = '#e2e8f0';
                  } else if (x >= -2 && x <= eCols + 1 && y === eRows) {
                    cTop = '#94a3b8'; 
                    cStroke = '#64748b';
                  } else if (y > eRows && y <= eRows + 9 && x >= -2 && x <= eCols + 1) {
                    cTop = '#334155'; 
                    cStroke = '#1e293b';
                    if (y >= eRows + 1 && y <= eRows + 4 && x % 3 === 0 && x >= 0 && x <= eCols) {
                        isParkingLine = true;
                    }
                  } else {
                    cTop = '#4ade80'; 
                    cStroke = '#22c55e';
                  }

                  ctx.fillStyle = cTop;
                  ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); ctx.closePath(); ctx.fill();
                  
                  if (isParkingLine) {
                     const l1 = toIso(map, x - 0.05, y, 0, camX, camY); 
                     const l2 = toIso(map, x + 0.05, y, 0, camX, camY); 
                     const l3 = toIso(map, x + 0.05, y+1, 0, camX, camY); 
                     const l4 = toIso(map, x - 0.05, y+1, 0, camX, camY);
                     ctx.fillStyle = '#ffffff';
                     ctx.beginPath(); ctx.moveTo(l1.x, l1.y); ctx.lineTo(l2.x, l2.y); ctx.lineTo(l3.x, l3.y); ctx.lineTo(l4.x, l4.y); ctx.closePath(); ctx.fill();
                  }

                  if (y === eRows + 2 && x >= -1 && x <= eCols && x % 2 === 0 && x >= eEntrance.gx - 5 && x <= eEntrance.gx - 2) {
                     const m1 = toIso(map, x + 0.2, y + 0.4, 0, camX, camY); const m2 = toIso(map, x + 0.8, y + 0.4, 0, camX, camY);
                     const m3 = toIso(map, x + 0.8, y + 0.6, 0, camX, camY); const m4 = toIso(map, x + 0.2, y + 0.6, 0, camX, camY);
                     ctx.fillStyle = '#facc15';
                     ctx.beginPath(); ctx.moveTo(m1.x, m1.y); ctx.lineTo(m2.x, m2.y); ctx.lineTo(m3.x, m3.y); ctx.lineTo(m4.x, m4.y); ctx.closePath(); ctx.fill();
                  }
                  
                  ctx.strokeStyle = cStroke; ctx.lineWidth = 1; ctx.stroke();
                }
              });
            }
          }

          for (let lx = 0; lx <= eCols; lx += 4) {
              if (lx >= eEntrance.gx - 2 && lx <= eEntrance.gx + 3) continue; 
              renderQueue.push({
                  type: 'streetlamp', isBox: true, gx: lx, gy: eRows + 0.5, gw: 0.2, gh: 0.2,
                  zIndex: lx + (eRows + 0.5) + 0.2,
                  draw: () => {
                      drawPrism(ctx, map, lx, eRows + 0.5, 0, 0.2, 0.2, 35, {top: '#475569', left: '#334155', right: '#1e293b'});
                      drawPrism(ctx, map, lx - 0.2, eRows + 0.3, 35, 0.6, 0.6, 2, {top: '#fef08a', left: '#fde047', right: '#facc15'});
                  }
              });
              if (isDark) {
                  state.lights.push(() => {
                      const lampPos = toIso(map, lx + 0.1, eRows + 0.6, 35, camX, camY);
                      const grad = ctx.createRadialGradient(lampPos.x, lampPos.y, 0, lampPos.x, lampPos.y, 120);
                      grad.addColorStop(0, 'rgba(253, 224, 71, 0.5)');
                      grad.addColorStop(1, 'rgba(253, 224, 71, 0)');
                      ctx.fillStyle = grad;
                      ctx.beginPath(); ctx.arc(lampPos.x, lampPos.y, 120, 0, Math.PI*2); ctx.fill();
                  });
              }
          }

          renderQueue.push({
            type: 'wall_base', zIndex: -2000, 
            draw: () => {
               drawPrism(ctx, map, 0, eRows, -10, eCols, 0, 10, {top: '#cbd5e1', left: '#94a3b8', right: '#64748b'});
               drawPrism(ctx, map, eCols, 0, -10, 0, eRows, 10, {top: '#cbd5e1', left: '#94a3b8', right: '#64748b'});
            }
          });

          state.trucks.forEach(t => {
              renderQueue.push({
                  type: 'truck', isBox: true, gx: t.x, gy: t.y, gw: 1.8, gh: 4.5,
                  zIndex: t.x + t.y + 6.3 * 0.1, 
                  draw: () => {
                      const shadow = toIso(map, t.x + 0.9, t.y + 2.25, 0, camX, camY);
                      ctx.fillStyle = 'rgba(0,0,0,0.4)';
                      ctx.beginPath(); ctx.ellipse(shadow.x, shadow.y, 25 * (map.tileW/60), 45 * (map.tileW/60), 0, 0, Math.PI*2); ctx.fill();

                      drawPrism(ctx, map, t.x, t.y + 1.5, 4, 1.8, 3.0, 24, {top: '#f8fafc', left: '#e2e8f0', right: '#cbd5e1'});
                      drawPrism(ctx, map, t.x + 0.1, t.y, 4, 1.6, 1.3, 16, {top: '#ef4444', left: '#dc2626', right: '#991b1b'});
                      drawPrism(ctx, map, t.x - 0.1, t.y + 0.2, 0, 2.0, 0.6, 4, {top: '#1e293b', left: '#0f172a', right: '#020617'});
                      drawPrism(ctx, map, t.x - 0.1, t.y + 2.0, 0, 2.0, 0.6, 4, {top: '#1e293b', left: '#0f172a', right: '#020617'});
                      drawPrism(ctx, map, t.x - 0.1, t.y + 3.5, 0, 2.0, 0.6, 4, {top: '#1e293b', left: '#0f172a', right: '#020617'});

                      if (t.state === 'WAITING') {
                          const uiPos = toIso(map, t.x + 0.9, t.y + 1.5, 80, camX, camY);
                          ctx.fillStyle = 'rgba(0,0,0,0.8)';
                          ctx.beginPath(); ctx.roundRect(uiPos.x - 30, uiPos.y - 12, 60, 20, 4); ctx.fill();
                          ctx.fillStyle = '#4ade80'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
                          ctx.fillText("PAY $20", uiPos.x, uiPos.y + 3);
                      }

                      if (isDark) {
                          state.lights.push(() => {
                              const l1 = toIso(map, t.x - 0.1, t.y + 4.5, 10, camX, camY);
                              const l2 = toIso(map, t.x + 1.9, t.y + 4.5, 10, camX, camY);
                              const l3 = toIso(map, t.x + 3.0, t.y + 8.0, 0, camX, camY);
                              const l4 = toIso(map, t.x - 1.0, t.y + 8.0, 0, camX, camY);
                              ctx.fillStyle = 'rgba(253, 224, 71, 0.15)';
                              ctx.beginPath(); ctx.moveTo(l1.x, l1.y); ctx.lineTo(l2.x, l2.y); ctx.lineTo(l3.x, l3.y); ctx.lineTo(l4.x, l4.y); ctx.closePath(); ctx.fill();
                          });
                      }
                  }
              });
          });

          for (let px = 0; px < eCols; px += 3) {
             if (px >= eEntrance.gx - 4 && px <= eEntrance.gx + 2) continue;
             if ((px * 17) % 5 === 0) continue; 

             renderQueue.push({
                 type: 'car', isBox: true, gx: px + 0.2, gy: eRows + 1.5, gw: 1.6, gh: 2.6,
                 zIndex: px + 0.2 + eRows + 1.5 + 4.2 * 0.1, 
                 draw: () => {
                     const carColors = [
                         {top: '#ef4444', left: '#dc2626', right: '#991b1b'}, 
                         {top: '#3b82f6', left: '#2563eb', right: '#1d4ed8'}, 
                         {top: '#eab308', left: '#ca8a04', right: '#854d0e'}, 
                         {top: '#f8fafc', left: '#e2e8f0', right: '#94a3b8'}, 
                         {top: '#10b981', left: '#059669', right: '#047857'}  
                     ];
                     const color = carColors[(px) % carColors.length];
                     
                     const shadow = toIso(map, px + 1.0, eRows + 2.8, 0, camX, camY);
                     ctx.fillStyle = 'rgba(0,0,0,0.3)';
                     ctx.beginPath(); ctx.ellipse(shadow.x, shadow.y, 25 * (map.tileW/60), 12 * (map.tileW/60), 0, 0, Math.PI*2); ctx.fill();

                     drawPrism(ctx, map, px + 0.2, eRows + 1.5, 0, 1.6, 2.6, 12, color);
                     drawPrism(ctx, map, px + 0.3, eRows + 2.0, 12, 1.4, 1.4, 10, {top: '#94a3b8', left: '#0f172a', right: '#1e293b'});
                     drawPrism(ctx, map, px + 0.3, eRows + 1.45, 6, 0.4, 0.1, 4, {top: '#fef08a', left: '#fef08a', right: '#fde047'});
                     drawPrism(ctx, map, px + 1.3, eRows + 1.45, 6, 0.4, 0.1, 4, {top: '#fef08a', left: '#fef08a', right: '#fde047'});

                     if (isDark) {
                         state.lights.push(() => {
                             const l1 = toIso(map, px + 0.3, eRows + 1.45, 6, camX, camY);
                             const l2 = toIso(map, px + 1.3, eRows + 1.45, 6, camX, camY);
                             const l3 = toIso(map, px + 1.8, eRows - 1.5, 0, camX, camY); 
                             const l4 = toIso(map, px - 0.2, eRows - 1.5, 0, camX, camY);
                             ctx.fillStyle = 'rgba(253, 224, 71, 0.12)';
                             ctx.beginPath(); ctx.moveTo(l1.x, l1.y); ctx.lineTo(l2.x, l2.y); ctx.lineTo(l3.x, l3.y); ctx.lineTo(l4.x, l4.y); ctx.closePath(); ctx.fill();
                             
                             const b1 = toIso(map, px + 0.5, eRows + 1.45, 6, camX, camY);
                             const b2 = toIso(map, px + 1.5, eRows + 1.45, 6, camX, camY);
                             ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                             ctx.beginPath(); ctx.arc(b1.x, b1.y, 2, 0, Math.PI*2); ctx.arc(b2.x, b2.y, 2, 0, Math.PI*2); ctx.fill();
                         });
                     }
                 }
             });
          }

          const dzX = eEntrance.gx - 3.75;
          const dzY = eRows + 1.25;
          renderQueue.push({
             type: 'delivery_zone', isBox: true, gx: dzX - 1.25, gy: dzY - 0.75, gw: 2.5, gh: 1.5,
             zIndex: dzX + dzY,
             draw: () => {
                drawPrism(ctx, map, dzX - 1.25, dzY - 0.75, 0, 2.5, 1.5, 2, {top: '#d97706', left: '#b45309', right: '#92400e'});
                
                if (state.supplies > 0) {
                    drawPrism(ctx, map, dzX - 1.05, dzY - 0.55, 2, 0.8, 0.8, 8, {top: '#fcd34d', left: '#fbbf24', right: '#f59e0b'});
                    if (state.supplies > 3) drawPrism(ctx, map, dzX - 0.05, dzY - 0.55, 2, 0.8, 0.8, 8, {top: '#fcd34d', left: '#fbbf24', right: '#f59e0b'});
                    if (state.supplies > 6) drawPrism(ctx, map, dzX - 0.55, dzY - 0.35, 10, 0.8, 0.8, 8, {top: '#fcd34d', left: '#fbbf24', right: '#f59e0b'});
                }

                const uiPos = toIso(map, dzX, dzY, 40, camX, camY);
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.beginPath(); ctx.roundRect(uiPos.x - 36, uiPos.y - 12, 72, 20, 4); ctx.fill();
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(`📦 ${state.supplies} LEFT`, uiPos.x, uiPos.y + 3);
             }
          });

          state.trash.forEach(t => {
              renderQueue.push({
                  type: 'trash', zIndex: t.x + t.y - 0.1, 
                  draw: () => {
                      const pos = toIso(map, t.x, t.y, 0, camX, camY);
                      ctx.save();
                      ctx.translate(pos.x, pos.y);
                      ctx.scale(map.tileW/60, map.tileW/60);
                      ctx.fillStyle = 'rgba(101, 67, 33, 0.8)';
                      ctx.beginPath();
                      ctx.ellipse(0, 0, 12, 6, 0, 0, Math.PI*2);
                      ctx.fill();

                      if (t.progress > 0) {
                          ctx.fillStyle = 'rgba(0,0,0,0.6)';
                          ctx.fillRect(-10, -15, 20, 5);
                          ctx.fillStyle = '#4ade80';
                          ctx.fillRect(-9, -14, 18 * t.progress, 3);
                      }
                      ctx.restore();
                  }
              });
          });

          Object.values(map.facilities).forEach(fac => {
            const lvl = facLevels[fac.id] || 0;
            const isNearby = nearbyFacility === fac.id;
            const sim = getSim(mIdx, fac.id);
            
            renderQueue.push({
              type: 'facility', 
              isBox: true, gx: fac.gx, gy: fac.gy, gw: fac.gw, gh: fac.gh,
              zIndex: fac.gx + fac.gy + (fac.gw + fac.gh)*0.1, 
              draw: () => {
                if (lvl === 0) {
                  drawPrism(ctx, map, fac.gx, fac.gy, 0, fac.gw, fac.gh, 0, fac.colors, true);
                  const center = toIso(map, fac.gx + fac.gw/2, fac.gy + fac.gh/2, 0, camX, camY);
                  ctx.fillStyle = '#64748b'; ctx.font = `bold ${16 * (map.tileW/60)}px sans-serif`; ctx.textAlign = 'center';
                  ctx.fillText("FOR SALE", center.x, center.y);
                } else {
                  
                  if (fac.type === 'store') {
                    drawPrism(ctx, map, fac.gx, fac.gy, 0, fac.gw, fac.gh, 10, {top: '#f8fafc', left: '#cbd5e1', right: '#94a3b8'});
                    drawPrism(ctx, map, fac.gx + fac.gw/2 - 0.2, fac.gy + 0.2, 10, 0.4, fac.gh - 0.4, 30, fac.colors); 
                    
                    if (sim.stock > 0) {
                      const itemRows = Math.floor(fac.gh / 1.0);
                      for(let i=0; i<itemRows; i++) {
                         const itemColor = fac.items[i % fac.items.length];
                         const iy = fac.gy + 0.4 + (i * 1.0);
                         drawPrism(ctx, map, fac.gx + 0.2, iy, 20, 0.6, 0.6, 6, {top: itemColor.cTop, left: itemColor.cLeft, right: itemColor.cRight});
                         drawPrism(ctx, map, fac.gx + fac.gw - 0.8, iy, 20, 0.6, 0.6, 6, {top: itemColor.cTop, left: itemColor.cLeft, right: itemColor.cRight});
                      }
                    }
                    
                    const uiPos = toIso(map, fac.gx + fac.gw/2, fac.gy + fac.gh/2, 90, camX, camY);
                    const maxStock = Math.floor(fac.gh * 2.5) + lvl * 10;
                    const stockRatio = sim.stock / maxStock;
                    
                    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.beginPath(); ctx.roundRect(uiPos.x - 20, uiPos.y - 20, 40, 6, 3); ctx.fill();
                    ctx.fillStyle = stockRatio > 0.2 ? '#3b82f6' : '#ef4444'; 
                    if (stockRatio > 0) {
                      ctx.beginPath(); ctx.roundRect(uiPos.x - 19, uiPos.y - 19, 38 * stockRatio, 4, 2); ctx.fill();
                    }

                    if (sim.stock < maxStock * 0.5) {
                       ctx.fillStyle = '#ef4444'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
                       ctx.fillText("📦", uiPos.x, uiPos.y - 30);
                    }

                  } else if (fac.type === 'register') {
                    drawPrism(ctx, map, fac.gx, fac.gy, 0, fac.gw, fac.gh, 22, fac.colors);
                    drawPrism(ctx, map, fac.gx + 0.2, fac.gy + 0.2, 22, fac.gw - 1.5, fac.gh - 0.4, 2, {top: '#1e293b', left: '#0f172a', right: '#020617'});
                    
                    const scanPos = toIso(map, fac.gx + fac.gw - 1.2, fac.gy + fac.gh/2, 25, camX, camY);
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.6)'; ctx.beginPath(); ctx.ellipse(scanPos.x, scanPos.y, 10, 5, 0, 0, Math.PI*2); ctx.fill();
                    
                    drawPrism(ctx, map, fac.gx + fac.gw - 1.0, fac.gy + 0.4, 22, 0.4, 0.7, 18, {top: '#3b82f6', left: '#2563eb', right: '#1d4ed8'});
                    
                    const cashierPos = toIso(map, fac.gx + fac.gw - 0.5, fac.gy + fac.gh/2, 0, camX, camY);
                    const cScale = map.tileW / 60;
                    ctx.save(); ctx.translate(cashierPos.x, cashierPos.y); ctx.scale(cScale, cScale);
                    ctx.fillStyle = '#f97316'; ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.arc(0, -10, 8, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.fillRect(-8, -10, 16, 10);
                    ctx.fillStyle = '#fef08a'; ctx.beginPath(); ctx.arc(0, -16, 6, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.arc(0, -18, 6, Math.PI, 0); ctx.fill(); 
                    ctx.restore();

                    if (sim.cash > 0) {
                       const uiPos = toIso(map, fac.gx + fac.gw/2, fac.gy + fac.gh/2, 90 + Math.sin(performance.now()/200)*5, camX, camY);
                       ctx.fillStyle = '#4ade80'; ctx.beginPath(); ctx.arc(uiPos.x, uiPos.y, 20, 0, Math.PI*2); ctx.fill();
                       ctx.strokeStyle = '#166534'; ctx.lineWidth = 3; ctx.stroke();
                       ctx.fillStyle = '#14532d'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
                       ctx.fillText("$", uiPos.x, uiPos.y + 7);
                    }
                  } else if (fac.type === 'security') {
                    // Security desk only
                    drawPrism(ctx, map, fac.gx, fac.gy, 0, fac.gw, fac.gh, 15, fac.colors);
                    drawPrism(ctx, map, fac.gx + 0.2, fac.gy + 0.2, 15, fac.gw - 0.4, fac.gh - 0.4, 15, {top: '#475569', left: '#334155', right: '#1e293b'});
                  } else if (fac.type === 'decoration') {
                    drawPrism(ctx, map, fac.gx + 0.1, fac.gy + 0.1, 0, fac.gw - 0.2, fac.gh - 0.2, 2, fac.colors);
                    
                    if (fac.subType === 'plant') {
                        drawPrism(ctx, map, fac.gx + 0.2, fac.gy + 0.2, 2, 0.6, 0.6, 8, {top: '#78350f', left: '#451a03', right: '#271001'});
                        const pSize = 0.4 + Math.min(lvl * 0.1, 0.6);
                        drawPrism(ctx, map, fac.gx + 0.5 - pSize/2, fac.gy + 0.5 - pSize/2, 10, pSize, pSize, 8 + lvl * 3, fac.colors);
                    } else if (fac.subType === 'statue') {
                        drawPrism(ctx, map, fac.gx + 0.2, fac.gy + 0.2, 2, 0.6, 0.6, 12, {top: '#e2e8f0', left: '#cbd5e1', right: '#94a3b8'});
                        drawPrism(ctx, map, fac.gx + 0.35, fac.gy + 0.35, 14, 0.3, 0.3, 15 + lvl * 5, fac.colors);
                    } else if (fac.subType === 'sign') {
                        drawPrism(ctx, map, fac.gx + 0.2, fac.gy + 0.4, 2, 0.2, 0.2, 30, {top: '#475569', left: '#334155', right: '#1e293b'});
                        drawPrism(ctx, map, fac.gx + fac.gw - 0.4, fac.gy + 0.4, 2, 0.2, 0.2, 30, {top: '#475569', left: '#334155', right: '#1e293b'});
                        drawPrism(ctx, map, fac.gx + 0.1, fac.gy + 0.4, 28, fac.gw - 0.2, 0.2, 5 + lvl * 2, {top: '#0f172a', left: '#020617', right: '#020617'});
                        
                        const signPos = toIso(map, fac.gx + fac.gw/2, fac.gy + 0.5, 34 + lvl, camX, camY);
                        ctx.fillStyle = fac.colors.top;
                        ctx.font = `bold ${12 + lvl * 2}px sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.fillText("OPEN", signPos.x, signPos.y);

                        if (isDark) {
                            state.lights.push(() => {
                                const grad = ctx.createRadialGradient(signPos.x, signPos.y, 0, signPos.x, signPos.y, 60 + lvl*15);
                                grad.addColorStop(0, `rgba(236, 72, 153, ${0.7 + Math.sin(performance.now()/150)*0.1})`);
                                grad.addColorStop(1, 'rgba(236, 72, 153, 0)');
                                ctx.fillStyle = grad;
                                ctx.beginPath(); ctx.arc(signPos.x, signPos.y, 60 + lvl*15, 0, Math.PI*2); ctx.fill();
                            });
                        }
                    }
                  }
                  
                  const isSelected = selectedFacility === fac.id;
                  
                  if (fac.type === 'security' && lvl > 0 && (isSelected || isNearby)) {
                    const radius = 2 + lvl * 1.5;
                    const center = toIso(map, fac.gx + fac.gw/2, fac.gy + fac.gh/2, 2, camX, camY);
                    ctx.strokeStyle = 'rgba(239, 68, 68, 0.4)';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([8, 8]);
                    ctx.beginPath(); ctx.ellipse(center.x, center.y, radius * (map.tileW / 2), radius * (map.tileH / 2), 0, 0, Math.PI * 2); ctx.stroke();
                    ctx.setLineDash([]);
                  } else if (isSelected) {
                    const center = toIso(map, fac.gx + fac.gw/2, fac.gy + fac.gh/2, 2, camX, camY);
                    ctx.strokeStyle = '#eab308'; 
                    ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.ellipse(center.x, center.y + 15, 48 * (map.tileW/60), 24 * (map.tileW/60), 0, 0, Math.PI * 2); ctx.stroke();
                  } else if (isNearby) {
                    const center = toIso(map, fac.gx + fac.gw/2, fac.gy + fac.gh/2, 2, camX, camY);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.beginPath(); ctx.ellipse(center.x, center.y + 15, 45 * (map.tileW/60), 22 * (map.tileW/60), 0, 0, Math.PI * 2); ctx.fill();
                  }

                  const barPos = toIso(map, fac.gx + fac.gw/2, fac.gy + fac.gh/2, 85, camX, camY);
                  state.npcs.forEach(npc => {
                    if ((npc.state === 'SHOPPING_WAIT' || npc.state === 'REG_WAIT') && npc.targetFacility === fac.id && !npc.isShoplifter) {
                      const maxT = npc.state === 'SHOPPING_WAIT' ? (fac.baseTimeMs / 1000) * Math.pow(0.95, lvl - 1) : (fac.baseTimeMs / 1000) * Math.pow(0.85, lvl - 1);
                      const prog = npc.timer / maxT;
                      ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.beginPath(); ctx.roundRect(barPos.x - 26, barPos.y - 2, 52, 10, 5); ctx.fill();
                      ctx.fillStyle = fac.type === 'store' ? '#facc15' : '#4ade80'; ctx.beginPath(); ctx.roundRect(barPos.x - 24, barPos.y, 48 * prog, 6, 3); ctx.fill();
                    }
                  });
                }
              }
            });
          });

          state.staff.forEach(s => {
            renderQueue.push({ type: 'staff', isChar: true, x: s.x, y: s.y, zIndex: s.x + s.y, draw: () => drawCharacter(ctx, map, s, '#22c55e', false, true, false) });
          });
          
          state.guards.forEach(g => {
            renderQueue.push({ type: 'guard', isChar: true, x: g.x, y: g.y, zIndex: g.x + g.y, draw: () => drawCharacter(ctx, map, g, '#3b82f6', false, false, true) });
          });

          state.npcs.forEach(npc => {
            renderQueue.push({ type: 'npc', isChar: true, x: npc.x, y: npc.y, zIndex: npc.x + npc.y, draw: () => drawCharacter(ctx, map, npc, npc.color) });
          });
          
          renderQueue.push({ type: 'player', isChar: true, x: state.player.x, y: state.player.y, zIndex: state.player.x + state.player.y, draw: () => drawCharacter(ctx, map, state.player, '#3b82f6', true) });

          renderQueue.push({
            type: 'wall_back', zIndex: -100, 
            draw: () => {
               drawPrism(ctx, map, 0, 0, 0, eCols, 0.5, 40, {top: '#f1f5f9', left: '#cbd5e1', right: '#e2e8f0'});
               drawPrism(ctx, map, 0, 0, 40, eCols, 0.2, 50, {top: 'rgba(186, 230, 253, 0.6)', left: 'rgba(125, 211, 252, 0.7)', right: 'rgba(56, 189, 248, 0.7)'});
               for(let i=0; i<eCols; i+=4) drawPrism(ctx, map, i, 0, 40, 0.4, 0.4, 50, {top: '#94a3b8', left: '#64748b', right: '#475569'});

               drawPrism(ctx, map, 0, 0, 0, 0.5, eRows, 40, {top: '#f1f5f9', left: '#cbd5e1', right: '#e2e8f0'});
               drawPrism(ctx, map, 0, 0, 40, 0.2, eRows, 50, {top: 'rgba(186, 230, 253, 0.6)', left: 'rgba(125, 211, 252, 0.7)', right: 'rgba(56, 189, 248, 0.7)'});
               for(let i=0; i<eRows; i+=4) drawPrism(ctx, map, 0, i, 40, 0.4, 0.4, 50, {top: '#94a3b8', left: '#64748b', right: '#475569'});
            }
          });

          for (let x = 0; x < eCols; x++) {
             if (x >= eEntrance.gx && x <= eEntrance.gx + 1) continue; 
             renderQueue.push({
                type: 'wall_front', isBox: true, gx: x, gy: eRows - 0.2, gw: 1.0, gh: 0.2,
                zIndex: x + eRows, 
                draw: () => {
                   drawPrism(ctx, map, x, eRows - 0.2, 0, 1.0, 0.2, 12, {top: '#e2e8f0', left: '#cbd5e1', right: '#94a3b8'});
                }
             });
          }
          for (let y = 0; y < eRows; y++) {
             renderQueue.push({
                type: 'wall_right', isBox: true, gx: eCols - 0.2, gy: y, gw: 0.2, gh: 1.0,
                zIndex: eCols + y,
                draw: () => {
                   drawPrism(ctx, map, eCols - 0.2, y, 0, 0.2, 1.0, 12, {top: '#e2e8f0', left: '#cbd5e1', right: '#94a3b8'});
                }
             });
          }

          renderQueue.push({
             type: 'door', isBox: true, gx: eEntrance.gx, gy: eRows - 0.2, gw: 2.2, gh: 0.4,
             zIndex: eEntrance.gx + eRows,
             draw: () => {
                const gx = eEntrance.gx;
                const gy = eRows - 0.2;
                const slideOffset = state.doorOpen * 0.9; 
                
                drawPrism(ctx, map, gx, gy, 0, 0.2, 0.4, 15, {top: '#475569', left: '#334155', right: '#1e293b'});
                drawPrism(ctx, map, gx + 2, gy, 0, 0.2, 0.4, 15, {top: '#475569', left: '#334155', right: '#1e293b'});
                drawPrism(ctx, map, gx, gy, 15, 2.2, 0.4, 1.5, {top: '#475569', left: '#334155', right: '#1e293b'});
                
                drawPrism(ctx, map, gx + 0.2 - slideOffset, gy + 0.1, 0, 0.85, 0.15, 15, {top: 'rgba(186, 230, 253, 0.6)', left: 'rgba(125, 211, 252, 0.7)', right: 'rgba(56, 189, 248, 0.7)'});
                drawPrism(ctx, map, gx + 1.15 + slideOffset, gy + 0.1, 0, 0.85, 0.15, 15, {top: 'rgba(186, 230, 253, 0.6)', left: 'rgba(125, 211, 252, 0.7)', right: 'rgba(56, 189, 248, 0.7)'});
                
                if (isDark) {
                    state.lights.push(() => {
                        const doorPos = toIso(map, gx + 1.1, gy, 0, camX, camY);
                        const grad = ctx.createRadialGradient(doorPos.x, doorPos.y, 0, doorPos.x, doorPos.y, 180);
                        grad.addColorStop(0, 'rgba(255, 247, 237, 0.3)'); 
                        grad.addColorStop(1, 'rgba(255, 247, 237, 0)');
                        ctx.fillStyle = grad;
                        ctx.beginPath(); ctx.arc(doorPos.x, doorPos.y, 180, 0, Math.PI*2); ctx.fill();
                    });
                }
             }
          });

          renderQueue.sort((a, b) => {
              if (a.zIndex < 0 || b.zIndex < 0) return a.zIndex - b.zIndex;

              if ((a.isBox || a.isChar) && (b.isBox || b.isChar)) {
                  const getBounds = (obj) => {
                      if (obj.isBox) return { minX: obj.gx, maxX: obj.gx + obj.gw, minY: obj.gy, maxY: obj.gy + obj.gh };
                      return { minX: obj.x - 0.35, maxX: obj.x + 0.35, minY: obj.y - 0.35, maxY: obj.y + 0.35 };
                  };

                  const bA = getBounds(a);
                  const bB = getBounds(b);
                  const eps = 0.01; 

                  const aBehindB = (bA.maxX <= bB.minX + eps) || (bA.maxY <= bB.minY + eps);
                  const bBehindA = (bB.maxX <= bA.minX + eps) || (bB.maxY <= bA.minY + eps);

                  if (aBehindB && !bBehindA) return -1;
                  if (bBehindA && !aBehindB) return 1;

                  const aZ = bA.minX + bA.maxX + bA.minY + bA.maxY;
                  const bZ = bB.minX + bB.maxX + bB.minY + bB.maxY;
                  return aZ - bZ;
              }
              
              return a.zIndex - b.zIndex;
          });

          renderQueue.forEach(item => item.draw());

          // --- Draw Tutorial Arrow Overlays ---
          if (tutRef.current >= 2 && tutRef.current <= 5) {
            let tx = 0, ty = 0;
            if (tutRef.current === 2) { tx = map.facilities.produce.gx + 1; ty = map.facilities.produce.gy + 3; }
            if (tutRef.current === 3) { tx = map.facilities.reg1.gx + 1.5; ty = map.facilities.reg1.gy + 1; }
            if (tutRef.current === 4) { tx = dzX; ty = dzY; }
            if (tutRef.current === 5) { tx = map.facilities.produce.gx + 1; ty = map.facilities.produce.gy + 3; }
            
            const bounce = Math.sin(performance.now() / 150) * 15;
            const pos = toIso(map, tx, ty, 80 + bounce, camX, camY);
            
            ctx.fillStyle = '#fde047';
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.lineTo(pos.x - 12, pos.y - 18);
            ctx.lineTo(pos.x - 6, pos.y - 18);
            ctx.lineTo(pos.x - 6, pos.y - 35);
            ctx.lineTo(pos.x + 6, pos.y - 35);
            ctx.lineTo(pos.x + 6, pos.y - 18);
            ctx.lineTo(pos.x + 12, pos.y - 18);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#ca8a04';
            ctx.lineWidth = 3;
            ctx.stroke();
          }

          const ambientColor = getAmbientColor(state.timeOfDay);
          if (ambientColor !== 'rgba(0, 0, 0, 0)') {
              ctx.fillStyle = ambientColor;
              ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
          }

          if (state.lights.length > 0) {
              ctx.globalCompositeOperation = 'lighter';
              state.lights.forEach(lightDrawFunc => lightDrawFunc());
              ctx.globalCompositeOperation = 'source-over';
          }

          if (state.player.interactTimer > 0) {
             const pPos = toIso(map, state.player.x, state.player.y, 80, camX, camY);
             ctx.fillStyle = 'rgba(0,0,0,0.6)';
             ctx.fillRect(pPos.x - 20, pPos.y, 40, 6);
             ctx.fillStyle = '#4ade80';
             ctx.fillRect(pPos.x - 19, pPos.y + 1, 38 * Math.min(1.0, state.player.interactTimer / 0.3), 4);
          }

          state.particles.forEach(p => {
            ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life);
            ctx.beginPath(); ctx.arc(p.bx + camX, p.by + camY, p.size, 0, Math.PI*2); ctx.fill();
            ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.stroke();
          });
          ctx.globalAlpha = 1.0;

          state.floatingTexts.forEach(ft => {
            ctx.fillStyle = ft.color; ctx.font = '900 24px "Inter", sans-serif'; ctx.textAlign = 'center';
            ctx.globalAlpha = Math.max(0, ft.life); 
            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 5; ctx.strokeText(ft.text, ft.bx + camX, ft.by + camY); 
            ctx.fillText(ft.text, ft.bx + camX, ft.by + camY);
          });
          ctx.globalAlpha = 1.0;
        };

        animationFrameId = requestAnimationFrame(gameLoop);
        return () => cancelAnimationFrame(animationFrameId);
      }, [addMoney, addGems, hasLoaded, getActiveMap, appMode]);

      const activeMap = getActiveMap();
      let interactData = null;
      if (selectedFacility) {
        const data = activeMap.facilities[selectedFacility];
        const level = facilities[currentMapIndex][selectedFacility] || 0;
        const cost = level === 0 ? data.baseCost : Math.floor(data.baseCost * Math.pow(data.costMult, level));
        
        let statLabel = ''; let statValue = '';
        if (data.type === 'store') {
          statLabel = 'Max Stock Capacity';
          const baseStock = Math.floor(data.gh * 2.5);
          statValue = level === 0 ? `${baseStock}` : `${baseStock + level*10} ➔ ${baseStock + (level+1)*10}`;
        } else if (data.type === 'security') {
          statLabel = 'Guard Catch Radius';
          statValue = level === 0 ? `0m` : `${2 + (level-1)*1.5}m ➔ ${2 + level*1.5}m`;
        } else if (data.type === 'decoration') {
          statLabel = 'Attractiveness Bonus';
          const curBonus = Math.floor(data.attrBonus * level * 100);
          const nextBonus = Math.floor(data.attrBonus * (level + 1) * 100);
          statValue = level === 0 ? `+${nextBonus}%` : `+${curBonus}% ➔ +${nextBonus}%`;
        } else {
          statLabel = 'Checkout Speed';
          const currentSpeed = level === 0 ? data.baseTimeMs / 1000 : (data.baseTimeMs / 1000) * Math.pow(0.85, level - 1);
          const nextSpeed = (data.baseTimeMs / 1000) * Math.pow(0.85, level);
          statValue = level === 0 ? `${nextSpeed.toFixed(1)}s` : `${currentSpeed.toFixed(1)}s ➔ ${nextSpeed.toFixed(1)}s`;
        }
        interactData = { ...data, level, cost, statLabel, statValue, canAfford: money >= cost };
      }

      const expandCost = 2000 * Math.pow(3, mapExpansions[currentMapIndex]);
      const currentStaff = staffCounts[currentMapIndex];
      const currentMaxStaff = BASE_MAX_STAFF + (mapExpansions[currentMapIndex] || 0) * 2;
      const isStaffMaxed = currentStaff >= currentMaxStaff;
      const hireCost = 1000 * Math.pow(2, currentStaff);

      // --- RENDER MAIN MENU ---
      if (appMode === 'menu') {
         return (
             <div className="min-h-screen bg-slate-900 bg-gradient-to-br from-indigo-900 via-purple-900 to-slate-900 flex flex-col items-center justify-center font-sans select-none relative overflow-hidden">
                {/* Decorative background elements */}
                <div className="absolute top-10 left-10 text-6xl opacity-20 rotate-12">🛒</div>
                <div className="absolute bottom-20 right-20 text-6xl opacity-20 -rotate-12">🛍️</div>
                <div className="absolute top-40 right-10 text-5xl opacity-20 rotate-45">💵</div>
                <div className="absolute bottom-40 left-10 text-7xl opacity-20 -rotate-6">🏬</div>

                {/* Settings Button */}
                <button 
                    onClick={() => setShowSettingsModal(true)}
                    className="absolute top-4 right-4 bg-white/20 hover:bg-white/30 backdrop-blur-md p-3 md:p-4 rounded-full border-2 border-white/30 shadow-lg transition-transform active:scale-95 z-40 text-xl md:text-2xl"
                    title="Settings"
                >
                    ⚙️
                </button>

                <div className="bg-white/10 backdrop-blur-md rounded-[3rem] shadow-2xl p-10 flex flex-col items-center max-w-md w-[90%] z-10 border border-white/20">
                    <div className="bg-gradient-to-br from-blue-400 to-indigo-600 w-24 h-24 rounded-3xl flex items-center justify-center text-5xl mb-6 shadow-lg border-4 border-white/30">
                        🏪
                    </div>
                    <h1 className="text-4xl md:text-5xl font-black text-white mb-2 text-center leading-tight tracking-tight drop-shadow-md">
                        Supermarket<br/><span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-300 to-orange-500">Tycoon</span>
                    </h1>
                    <p className="text-slate-300 font-bold mb-10 text-center">Manage, expand, and get rich.</p>
                    
                    <div className="flex flex-col gap-4 w-full">
                        {hasSaveData && (
                            <button 
                                onClick={handleContinueGame}
                                className="w-full py-4 bg-green-500 hover:bg-green-400 text-white rounded-2xl font-black text-xl transition-transform active:scale-95 shadow-lg border-b-[6px] border-green-700 flex justify-center items-center gap-3"
                            >
                                <span>▶️</span> Continue Game
                            </button>
                        )}
                        <button 
                            onClick={checkNewGameClick}
                            className={`w-full py-4 rounded-2xl font-black text-xl transition-transform active:scale-95 shadow-lg border-b-[6px] flex justify-center items-center gap-3
                                ${hasSaveData ? 'bg-slate-700 hover:bg-slate-600 text-white border-slate-900' : 'bg-blue-500 hover:bg-blue-400 text-white border-blue-700'}`}
                        >
                            <span>✨</span> New Game
                        </button>
                    </div>
                </div>

                {/* Settings Modal (Main Menu context) */}
                {showSettingsModal && (
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4 animate-in fade-in duration-200">
                      <div className="bg-white rounded-[2rem] shadow-2xl max-w-md w-full p-6 md:p-8 flex flex-col gap-6">
                        <div className="flex justify-between items-center border-b-2 border-slate-100 pb-4">
                          <h2 className="text-2xl font-black text-slate-800 flex items-center gap-2"><span>⚙️</span> Settings</h2>
                          <button onClick={() => setShowSettingsModal(false)} className="bg-slate-100 text-slate-500 p-2 rounded-full hover:bg-slate-200 transition-colors">
                            <span>❌</span>
                          </button>
                        </div>
                        
                        <div className="flex flex-col gap-4">
                          <div className="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border-2 border-slate-100">
                            <span className="font-black text-lg text-slate-700">Sound Effects (SFX)</span>
                            <button onClick={toggleSfx} className={`w-16 h-8 flex items-center rounded-full p-1 transition-colors ${sfxOn ? 'bg-green-500' : 'bg-slate-300'}`}>
                               <div className={`bg-white w-6 h-6 rounded-full shadow-md transform transition-transform ${sfxOn ? 'translate-x-8' : ''}`}></div>
                            </button>
                          </div>
                          
                          <div className="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border-2 border-slate-100">
                            <span className="font-black text-lg text-slate-700">Background Music</span>
                            <button onClick={toggleBgm} className={`w-16 h-8 flex items-center rounded-full p-1 transition-colors ${bgmOn ? 'bg-blue-500' : 'bg-slate-300'}`}>
                               <div className={`bg-white w-6 h-6 rounded-full shadow-md transform transition-transform ${bgmOn ? 'translate-x-8' : ''}`}></div>
                            </button>
                          </div>
                        </div>
                      </div>
                    </div>
                )}

                {/* Confirm New Game Modal */}
                {showConfirmNew && (
                    <div className="absolute inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in fade-in duration-200">
                        <div className="bg-white rounded-3xl max-w-sm w-full p-8 flex flex-col items-center text-center shadow-2xl">
                            <span className="text-5xl mb-4">⚠️</span>
                            <h2 className="text-2xl font-black text-slate-800 mb-2">Overwrite Save?</h2>
                            <p className="text-slate-600 font-bold mb-8">Starting a new game will completely erase your current supermarket empire. Are you sure?</p>
                            <div className="flex w-full gap-4">
                                <button 
                                    onClick={() => setShowConfirmNew(false)}
                                    className="flex-1 py-3 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-xl font-black border-b-4 border-slate-300 active:scale-95 transition-transform"
                                >
                                    Cancel
                                </button>
                                <button 
                                    onClick={handleStartNewGame}
                                    className="flex-1 py-3 bg-red-500 hover:bg-red-400 text-white rounded-xl font-black border-b-4 border-red-700 active:scale-95 transition-transform"
                                >
                                    Erase & Start
                                </button>
                            </div>
                        </div>
                    </div>
                )}
             </div>
         );
      }

      if (!hasLoaded) return null;

      // --- RENDER PLAYING ---
      return (
        <div className="min-h-screen bg-[#dbeafe] flex flex-col items-center justify-center font-sans select-none overflow-hidden relative">
          
          {tutorialStep > 0 && (
            <div className="absolute top-20 md:top-24 left-1/2 -translate-x-1/2 z-30 pointer-events-auto w-[90%] max-w-lg animate-in fade-in slide-in-from-top-4 duration-300">
              <div className="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl border-[4px] border-blue-400 p-6 text-center flex flex-col items-center gap-3">
                 <div className="text-4xl">
                     {tutorialStep === 1 && '👋'}
                     {tutorialStep === 2 && '🔨'}
                     {tutorialStep === 3 && '💳'}
                     {tutorialStep === 4 && '📦'}
                     {tutorialStep === 5 && '🥬'}
                     {tutorialStep === 6 && '🎉'}
                 </div>
                 <h3 className="text-lg md:text-xl font-black text-slate-800 leading-tight">
                    {tutorialStep === 1 && "Welcome Tycoon! Move your player around using WASD, Arrow Keys, or the Joystick on your screen."}
                    {tutorialStep === 2 && "Time to open shop! Tap on an empty plot and Build an aisle."}
                    {tutorialStep === 3 && "Customers will automatically buy things. Wait for them to finish, then go to the Register to collect your cash!"}
                    {tutorialStep === 4 && "You need more supplies to keep earning. Walk outside to the Delivery Zone and pick up some boxes."}
                    {tutorialStep === 5 && "Great! Now walk to your empty aisle and stand near it to restock the shelves."}
                    {tutorialStep === 6 && "You're a natural! Use your money to expand, hire staff, and build your empire."}
                 </h3>
                 {tutorialStep === 6 && (
                    <button 
                       onClick={() => { setTutorialStep(0); tutRef.current = 0; }} 
                       className="mt-2 bg-blue-500 hover:bg-blue-400 text-white font-black py-3 px-8 rounded-2xl border-b-[4px] border-blue-700 active:scale-95 transition-transform shadow-lg text-lg"
                    >
                        Start Playing!
                    </button>
                 )}
              </div>
            </div>
          )}

          <div className="absolute top-2 md:top-4 w-full px-2 md:px-4 z-10 flex flex-wrap justify-between items-center pointer-events-none max-w-5xl gap-y-2">
            <div className="flex gap-2 w-full md:w-auto justify-between md:justify-start">
              <div className="bg-slate-900 text-white px-3 md:px-5 py-1.5 md:py-2.5 rounded-full border-2 border-slate-700 shadow-[0_8px_16px_rgba(15,23,42,0.4)] flex items-center gap-1 md:gap-2 pointer-events-auto backdrop-blur-md min-w-[120px] md:min-w-[140px] justify-center">
                 <span className="text-sm md:text-xl">⏱️</span>
                 <span id="game-clock" className="font-digital font-black text-sm md:text-xl tracking-widest text-blue-200">08:00 AM</span>
                 <span id="store-status" className="font-black text-xs md:text-sm ml-1 md:ml-2 text-green-400">OPEN</span>
              </div>
              <div className="bg-[#4f46e5] text-white px-3 md:px-5 py-1.5 md:py-2.5 rounded-full border-2 border-indigo-400 shadow-[0_8px_16px_rgba(79,70,229,0.4)] flex items-center gap-1 md:gap-2 pointer-events-auto backdrop-blur-md">
                 <span className="text-[#4ade80] text-sm md:text-xl">📈</span>
                 <span className="font-black text-sm md:text-lg tracking-tight">{formatMoney(incomeRate)}<span className="text-xs md:text-sm text-indigo-200 ml-0.5 md:ml-1">/m</span></span>
              </div>
            </div>

            <div className="flex items-center gap-2 w-full md:w-auto justify-center md:justify-end">
               <div className="bg-[#ec4899] text-white px-3 md:px-5 py-1.5 md:py-2.5 rounded-full border-2 border-pink-400 shadow-[0_8px_16px_rgba(236,72,153,0.4)] flex items-center gap-1 md:gap-2 pointer-events-auto">
                 <span className="text-pink-200 text-sm md:text-lg">✨</span>
                 <span className="font-black text-sm md:text-lg tracking-tight">{Math.round(currentAttractiveness * 100)}%</span>
               </div>

               <div className="bg-[#22c55e] text-white px-4 md:px-6 py-1.5 md:py-2.5 rounded-full border-2 border-green-400 shadow-[0_8px_16px_rgba(34,197,94,0.4)] flex items-center gap-1 md:gap-2 pointer-events-auto">
                 <span className="bg-white/20 rounded-full px-1 text-xs md:text-sm font-bold">💲</span>
                 <span className="font-black text-sm md:text-xl tracking-tight">{formatMoney(money)}</span>
               </div>
               
               <div className="bg-[#9333ea] text-white pl-3 md:pl-4 pr-1 py-1 rounded-full border-2 border-purple-400 shadow-[0_8px_16px_rgba(147,51,234,0.4)] flex items-center gap-1 md:gap-3 pointer-events-auto">
                 <span className="text-purple-200 text-sm md:text-lg">💎</span>
                 <span className="font-black text-sm md:text-lg">{gems}</span>
                 <button onClick={() => setShowUpgradesModal(true)} className="bg-white/20 hover:bg-white/30 transition-colors rounded-full w-6 h-6 md:w-8 md:h-8 flex items-center justify-center cursor-pointer">
                   <span className="text-white text-xs md:text-base">➕</span>
                 </button>
               </div>
            </div>
          </div>

          <div className="absolute bottom-4 left-4 z-10 pointer-events-auto flex flex-col md:flex-row gap-2 md:gap-4 hidden md:flex">
            <button 
              onClick={handleExpandStore}
              disabled={money < expandCost}
              className={`px-4 py-2 md:px-6 md:py-4 rounded-[1rem] md:rounded-[1.5rem] font-black text-sm md:text-xl flex flex-col items-center justify-center md:gap-1 transition-transform active:scale-95 shadow-xl border-[3px] md:border-[4px] border-white
                ${money >= expandCost ? 'bg-amber-500 text-white hover:bg-amber-400' : 'bg-slate-300 text-slate-500 cursor-not-allowed'}`}
            >
              <span>🏗️ Expand</span>
              <span className="text-xs md:text-sm bg-black/20 px-2 py-0.5 rounded-full">${formatMoney(expandCost)}</span>
            </button>

            <button 
              onClick={handleHireStaff}
              disabled={isStaffMaxed || money < hireCost}
              className={`px-4 py-2 md:px-6 md:py-4 rounded-[1rem] md:rounded-[1.5rem] font-black text-sm md:text-xl flex flex-col items-center justify-center md:gap-1 transition-transform active:scale-95 shadow-xl border-[3px] md:border-[4px] border-white
                ${isStaffMaxed ? 'bg-slate-400 text-white cursor-not-allowed' : money >= hireCost ? 'bg-green-500 text-white hover:bg-green-400' : 'bg-slate-300 text-slate-500 cursor-not-allowed'}`}
            >
              <span>🧑‍🍳 Hire ({currentStaff}/{currentMaxStaff})</span>
              <span className="text-xs md:text-sm bg-black/20 px-2 py-0.5 rounded-full">{isStaffMaxed ? 'MAX' : `$${formatMoney(hireCost)}`}</span>
            </button>
          </div>

          <div 
            ref={joystickBaseRef}
            className="fixed bottom-6 left-6 w-32 h-32 bg-white/20 rounded-full border-2 border-white/40 backdrop-blur-sm flex items-center justify-center touch-none md:hidden z-40 pointer-events-auto"
            onTouchStart={handleTouchStart}
            onTouchMove={handleTouchMove}
            onTouchEnd={handleTouchEnd}
          >
             <div 
               className="w-12 h-12 bg-white/90 rounded-full shadow-lg border border-slate-200 pointer-events-none transition-transform duration-75" 
               style={{ transform: `translate(${joystickPos.x}px, ${joystickPos.y}px)` }} 
             />
          </div>
          
          <div className="absolute bottom-6 right-4 z-10 pointer-events-auto flex flex-col gap-2 md:hidden">
             <button 
              onClick={handleExpandStore} disabled={money < expandCost}
              className={`w-14 h-14 rounded-full font-black text-lg flex items-center justify-center transition-transform active:scale-95 shadow-xl border-2 border-white
                ${money >= expandCost ? 'bg-amber-500 text-white' : 'bg-slate-300 text-slate-500'}`}>🏗️</button>
             <button 
              onClick={handleHireStaff} disabled={isStaffMaxed || money < hireCost}
              className={`w-14 h-14 rounded-full font-black text-lg flex items-center justify-center transition-transform active:scale-95 shadow-xl border-2 border-white
                ${isStaffMaxed ? 'bg-slate-400 text-white' : money >= hireCost ? 'bg-green-500 text-white' : 'bg-slate-300 text-slate-500'}`}>🧑‍🍳</button>
          </div>

          <div className="absolute top-28 md:top-24 right-2 md:right-4 z-10 flex flex-col gap-2 md:gap-4 pointer-events-auto">
            <button 
              onClick={() => setShowMapModal(true)} 
              className="w-12 h-12 md:w-16 md:h-16 bg-blue-500 rounded-full border-[2px] md:border-[3px] border-white shadow-[0_10px_20px_rgba(59,130,246,0.5)] flex items-center justify-center active:scale-90 transition-all hover:bg-blue-400 group relative"
            >
              <span className="text-white drop-shadow-md text-xl md:text-2xl">🗺️</span>
              <span className="absolute right-full mr-4 bg-black/70 text-white px-2 py-1 rounded text-sm font-bold opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity whitespace-nowrap hidden md:block">Map</span>
            </button>
            
            <button 
              onClick={() => setShowUpgradesModal(true)} 
              className="w-12 h-12 md:w-16 md:h-16 bg-purple-500 rounded-full border-[2px] md:border-[3px] border-white shadow-[0_10px_20px_rgba(147,51,234,0.5)] flex items-center justify-center active:scale-90 transition-all hover:bg-purple-400 group relative"
            >
              <span className="text-white drop-shadow-md text-xl md:text-2xl">💎</span>
              <span className="absolute right-full mr-4 bg-black/70 text-white px-2 py-1 rounded text-sm font-bold opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity whitespace-nowrap hidden md:block">Upgrades</span>
            </button>
            
            {/* Settings Button */}
            <button 
              onClick={() => setShowSettingsModal(true)} 
              className="w-12 h-12 md:w-16 md:h-16 bg-slate-700 rounded-full border-[2px] md:border-[3px] border-white shadow-[0_10px_20px_rgba(15,23,42,0.5)] flex items-center justify-center active:scale-90 transition-all hover:bg-slate-600 group relative mt-4 md:mt-8"
            >
              <span className="text-white drop-shadow-md text-xl md:text-2xl">⚙️</span>
              <span className="absolute right-full mr-4 bg-black/70 text-white px-2 py-1 rounded text-sm font-bold opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity whitespace-nowrap hidden md:block">Settings</span>
            </button>
          </div>

          <div className="relative shadow-[0_10px_30px_rgba(0,0,0,0.3)] md:shadow-[0_20px_50px_rgba(0,0,0,0.3)] rounded-[1.5rem] md:rounded-[2.5rem] overflow-hidden border-[6px] md:border-[10px] border-slate-800 bg-[#e2e8f0] max-w-5xl w-[95%] md:w-full h-[75vh] md:h-[85vh]">
            <canvas
              ref={canvasRef} width={CANVAS_WIDTH} height={CANVAS_HEIGHT}
              onPointerDown={handlePointerDown}
              className="w-full h-full object-contain touch-none cursor-crosshair bg-sky-200"
            />
            
            <div className="absolute top-2 left-2 flex flex-col gap-1 md:top-4 md:left-4 md:gap-2 pointer-events-none">
               <div className="bg-white/80 backdrop-blur-md px-2 py-1 md:px-3 md:py-1.5 rounded-full shadow-sm border border-white/50 flex items-center gap-1 md:gap-2">
                 <span className="text-amber-500 text-xs md:text-sm">🏃</span> <span className="text-[10px] md:text-xs font-bold text-slate-700">Click thieves to bust!</span>
               </div>
            </div>
          </div>

          {/* Settings Modal (In-game) */}
          {showSettingsModal && (
            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4 animate-in fade-in duration-200 pointer-events-auto">
              <div className="bg-white rounded-[2rem] shadow-2xl max-w-md w-full p-6 md:p-8 flex flex-col gap-6">
                <div className="flex justify-between items-center border-b-2 border-slate-100 pb-4">
                  <h2 className="text-2xl font-black text-slate-800 flex items-center gap-2"><span>⚙️</span> Settings</h2>
                  <button onClick={() => setShowSettingsModal(false)} className="bg-slate-100 text-slate-500 p-2 rounded-full hover:bg-slate-200 transition-colors">
                    <span>❌</span>
                  </button>
                </div>
                
                <div className="flex flex-col gap-4">
                  <div className="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border-2 border-slate-100">
                    <span className="font-black text-lg text-slate-700">Sound Effects (SFX)</span>
                    <button onClick={toggleSfx} className={`w-16 h-8 flex items-center rounded-full p-1 transition-colors ${sfxOn ? 'bg-green-500' : 'bg-slate-300'}`}>
                       <div className={`bg-white w-6 h-6 rounded-full shadow-md transform transition-transform ${sfxOn ? 'translate-x-8' : ''}`}></div>
                    </button>
                  </div>
                  
                  <div className="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border-2 border-slate-100">
                    <span className="font-black text-lg text-slate-700">Background Music</span>
                    <button onClick={toggleBgm} className={`w-16 h-8 flex items-center rounded-full p-1 transition-colors ${bgmOn ? 'bg-blue-500' : 'bg-slate-300'}`}>
                       <div className={`bg-white w-6 h-6 rounded-full shadow-md transform transition-transform ${bgmOn ? 'translate-x-8' : ''}`}></div>
                    </button>
                  </div>
                </div>

                <button 
                  onClick={() => { stopBGM(); setShowSettingsModal(false); setAppMode('menu'); }} 
                  className="mt-4 w-full py-4 bg-rose-500 hover:bg-rose-400 text-white rounded-2xl font-black text-xl transition-transform active:scale-95 shadow-lg border-b-[4px] border-rose-700 flex justify-center items-center gap-3"
                >
                  🚪 Quit to Main Menu
                </button>
              </div>
            </div>
          )}

          {showUpgradesModal && (
            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-2 md:p-4 animate-in fade-in duration-200 pointer-events-auto">
              <div className="bg-white rounded-[2rem] md:rounded-[3rem] shadow-2xl max-w-2xl w-full p-4 md:p-8 flex flex-col gap-4 md:gap-6 max-h-[95vh] overflow-y-auto">
                <div className="flex justify-between items-center border-b-2 border-slate-100 pb-2 md:pb-4 shrink-0">
                  <h2 className="text-xl md:text-3xl font-black text-slate-800 flex items-center gap-2 md:gap-3"><span className="text-purple-500 text-xl md:text-3xl">💎</span> Global Upgrades</h2>
                  <button onClick={() => setShowUpgradesModal(false)} className="bg-slate-100 text-slate-500 p-2 md:p-3 rounded-full hover:bg-slate-200 transition-colors">
                    <span className="text-lg md:text-2xl">❌</span>
                  </button>
                </div>
                
                <div className="flex flex-col gap-4">
                  {Object.keys(UPGRADES_DB).map((key) => {
                    const upg = UPGRADES_DB[key];
                    const curLevel = upgrades[key];
                    const isMax = curLevel >= upg.maxLevel;
                    const cost = Math.floor(upg.baseCost * Math.pow(upg.costMult, curLevel));
                    const canAfford = gems >= cost;
                    
                    return (
                      <div key={key} className={`border-[2px] md:border-[3px] rounded-[1.5rem] md:rounded-[2rem] p-4 flex justify-between items-center transition-all ${isMax ? 'border-amber-400 bg-amber-50' : 'border-slate-200 bg-white hover:border-purple-300 hover:shadow-md'}`}>
                        <div className="flex items-center gap-4">
                            <div className="text-4xl md:text-5xl drop-shadow-sm">{upg.icon}</div>
                            <div>
                                <h3 className="text-lg md:text-xl font-black text-slate-800 leading-tight">{upg.name}</h3>
                                <p className="text-xs md:text-sm font-bold text-slate-500 mb-1">{upg.desc}</p>
                                <span className={`text-[10px] md:text-xs font-black uppercase tracking-widest px-2 py-0.5 rounded-lg ${isMax ? 'bg-amber-200 text-amber-800' : 'bg-blue-100 text-blue-700'}`}>
                                    Level {curLevel} / {upg.maxLevel}
                                </span>
                            </div>
                        </div>
                        <button 
                          onClick={() => handleBuyUpgrade(key)} disabled={isMax || !canAfford}
                          className={`px-4 py-3 md:px-6 md:py-4 rounded-[1rem] md:rounded-[1.5rem] font-black text-sm md:text-lg transition-transform active:scale-95 shadow-md flex justify-center items-center gap-2 whitespace-nowrap
                            ${isMax ? 'bg-amber-500 text-white cursor-not-allowed border-b-4 border-amber-600' : 
                              canAfford ? 'bg-purple-500 text-white hover:bg-purple-400 border-b-4 border-purple-700' : 
                              'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                        >
                          {isMax ? 'MAXED' : <><span>💎</span> {cost}</>}
                        </button>
                      </div>
                    )
                  })}
                </div>
              </div>
            </div>
          )}

          {showMapModal && (
            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-2 md:p-4 animate-in fade-in duration-200 pointer-events-auto">
              <div className="bg-white rounded-[2rem] md:rounded-[3rem] shadow-2xl max-w-4xl w-full p-4 md:p-8 flex flex-col gap-4 md:gap-6 max-h-[95vh] overflow-y-auto">
                <div className="flex justify-between items-center border-b-2 border-slate-100 pb-2 md:pb-4 shrink-0">
                  <h2 className="text-xl md:text-3xl font-black text-slate-800 flex items-center gap-2 md:gap-3"><span className="text-blue-500 text-xl md:text-3xl">📍</span> Select Location</h2>
                  <button onClick={() => setShowMapModal(false)} className="bg-slate-100 text-slate-500 p-2 md:p-3 rounded-full hover:bg-slate-200 transition-colors">
                    <span className="text-lg md:text-2xl">❌</span>
                  </button>
                </div>
                
                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 md:gap-6">
                  {MAPS.map((m, idx) => {
                    const activeCols = m.cols + mapExpansions[idx] * 4;
                    const activeRows = m.rows + mapExpansions[idx] * 4;
                    return (
                      <div key={m.id} className={`border-[2px] md:border-[3px] rounded-[1.5rem] md:rounded-[2rem] p-4 md:p-6 flex flex-col gap-3 md:gap-4 relative overflow-hidden transition-all
                        ${currentMapIndex === idx ? 'border-blue-500 bg-blue-50 scale-105 shadow-xl' : 'border-slate-200 bg-white hover:border-blue-300 hover:shadow-md'}`}>
                        
                        {currentMapIndex === idx && <div className="absolute top-0 left-0 right-0 bg-blue-500 text-white text-[8px] md:text-[10px] font-black text-center py-1 tracking-widest uppercase">Current Location</div>}
                        
                        <div className="mt-2 md:mt-4">
                          <h3 className="text-lg md:text-xl font-black text-slate-800 leading-tight">{m.name}</h3>
                          <p className="text-xs md:text-sm font-bold text-slate-500">{activeCols}x{activeRows} Expansion</p>
                        </div>
                        
                        <div className="flex-grow">
                          <ul className="text-xs md:text-sm font-bold text-slate-600 flex flex-col gap-1 md:gap-2 bg-white/50 p-2 md:p-3 rounded-xl">
                              <li className="flex items-center gap-2"><span className="text-green-500">🏪</span> {Object.keys(getActiveMap().facilities).filter(f => getActiveMap().facilities[f].type === 'store').length} Aisles</li>
                              <li className="flex items-center gap-2"><span className="text-purple-500">💳</span> {Object.keys(getActiveMap().facilities).filter(f => getActiveMap().facilities[f].type === 'register').length} Registers</li>
                              <li className="flex items-center gap-2"><span className="text-blue-500">🧑‍🍳</span> {staffCounts[idx]} Staff</li>
                          </ul>
                        </div>

                        <button 
                          onClick={() => handleTravel(idx)}
                          disabled={!unlockedMaps[idx] && money < m.unlockCost}
                          className={`w-full py-3 md:py-4 rounded-[1rem] md:rounded-[1.5rem] font-black text-sm md:text-lg transition-transform active:scale-95 shadow-md flex justify-center items-center gap-2
                            ${currentMapIndex === idx ? 'bg-blue-600 text-white opacity-50 cursor-not-allowed' : 
                              unlockedMaps[idx] ? 'bg-blue-500 text-white hover:bg-blue-400 border-b-4 border-blue-700' :
                              money >= m.unlockCost ? 'bg-green-500 text-white hover:bg-green-400 border-b-4 border-green-700' : 
                              'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                        >
                          {currentMapIndex === idx ? 'Here' : 
                          unlockedMaps[idx] ? 'Travel' : 
                          <><span>💲</span> Unlock {formatMoney(m.unlockCost)}</>}
                        </button>
                      </div>
                    )
                  })}
                </div>
              </div>
            </div>
          )}

          <div 
            className={`absolute bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md transition-transform duration-300 ease-[cubic-bezier(0.34,1.56,0.64,1)] z-20 pointer-events-auto
            ${interactData ? 'translate-y-0' : 'translate-y-full'}`}
          >
            <div className="bg-white rounded-t-[2rem] md:rounded-t-[3rem] shadow-[0_-20px_50px_rgba(0,0,0,0.15)] p-6 md:p-8 pb-8 md:pb-10 border-t-4 md:border-t-8 border-slate-100 flex flex-col gap-4 md:gap-6">
              
              <div className="absolute top-3 left-1/2 -translate-x-1/2 w-12 md:w-16 h-1 md:h-1.5 bg-slate-300 rounded-full"></div>

              {interactData && (
                <>
                  <div className="flex justify-between items-center mt-2">
                    <div className="flex items-center gap-3 md:gap-4">
                      <div className={`p-3 md:p-4 rounded-[1rem] md:rounded-[1.5rem] text-white shadow-inner flex items-center justify-center h-[50px] w-[50px] md:h-[64px] md:w-[64px]`} style={{ backgroundColor: interactData.colors.top }}>
                        {interactData.level === 0 ? <span className="text-2xl md:text-3xl">🔨</span> : (
                          interactData.type === 'store' ? <span className="text-2xl md:text-3xl">🏪</span> : 
                          interactData.type === 'security' ? <span className="text-2xl md:text-3xl">🛡️</span> : 
                          interactData.type === 'decoration' ? <span className="text-2xl md:text-3xl">✨</span> : 
                          <span className="text-2xl md:text-3xl">💳</span>
                        )}
                      </div>
                      <div>
                        <h2 className="text-xl md:text-3xl font-black text-slate-800 leading-tight tracking-tight">{interactData.name}</h2>
                        {interactData.level > 0 ? (
                          <span className="text-xs md:text-sm font-black text-blue-600 uppercase tracking-widest bg-blue-50 px-2 py-0.5 md:px-3 md:py-1 rounded-lg mt-1 inline-block">Level {interactData.level}</span>
                        ) : <span className="text-xs md:text-sm font-black text-amber-600 uppercase tracking-widest bg-amber-50 px-2 py-0.5 md:px-3 md:py-1 rounded-lg mt-1 inline-block">Empty Plot</span>}
                      </div>
                    </div>
                    <button onClick={() => setSelectedFacility(null)} className="bg-slate-100 p-2 md:p-3 rounded-full text-slate-400 hover:bg-slate-200 hover:text-slate-600 transition-colors">
                      <span className="text-xl md:text-2xl inline-block">🔽</span>
                    </button>
                  </div>
                  
                  <div className="bg-slate-50 rounded-2xl md:rounded-3xl p-4 md:p-5 flex justify-between items-center border-2 border-slate-100">
                    <span className="text-xs md:text-sm font-black text-slate-400 uppercase tracking-wider">{interactData.statLabel}</span>
                    <span className={`text-lg md:text-2xl font-black ${interactData.type === 'store' ? 'text-green-500' : interactData.type === 'decoration' ? 'text-pink-500' : 'text-blue-500'}`}>
                      {interactData.statValue}
                    </span>
                  </div>

                  <button
                    onClick={handleInteract} disabled={!interactData.canAfford}
                    className={`w-full py-4 md:py-5 rounded-[1.5rem] md:rounded-[2rem] font-black text-xl md:text-2xl flex items-center justify-center gap-2 md:gap-3 transition-transform active:scale-95 shadow-xl
                      ${interactData.canAfford ? 'bg-blue-500 text-white hover:bg-blue-400 border-b-[4px] md:border-b-[6px] border-blue-700' : 'bg-slate-200 text-slate-400 cursor-not-allowed border-b-[4px] md:border-b-[6px] border-slate-300'}`}
                  >
                    {interactData.level === 0 ? 'Build' : 'Upgrade'}
                    <span className={`ml-1 md:ml-2 px-3 md:px-4 py-1 md:py-1.5 rounded-xl md:rounded-2xl text-base md:text-lg ${interactData.canAfford ? 'bg-blue-700 shadow-inner' : 'bg-slate-300 text-slate-500'}`}>
                      {formatMoney(interactData.cost)}
                    </span>
                  </button>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SupermarketGame />);
  </script>
</body>
</html>
