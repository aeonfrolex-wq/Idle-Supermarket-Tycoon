    // --- Audio System (Web Audio API) ---
    let audioCtx = null;
    let isSfxEnabled = true; // Global SFX flag
    let isBgmEnabled = true; // Global BGM flag

    const initAudio = () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    };

    const playTone = (freq, type, duration, vol = 0.1) => {
        if (!isSfxEnabled) return; 
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    };

    const SOUNDS = {

            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.02, audioCtx.currentTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        },
        trash: () => {
            if (!isSfxEnabled) return;
            initAudio();
            const bufferSize = audioCtx.sampleRate * 0.15; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            noise.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
        }
    };

    // --- Background Music System ---
    const BGM_NOTES = [
        392.00, 329.63, 261.63, 329.63,
        392.00, 523.25, 392.00, 0,

        349.23, 440.00, 392.00, 0
    ];
    let bgmInterval = null;
    let bgmStep = 0;

    const playBGMNote = () => {
        if (!isBgmEnabled) return;
        initAudio();
        const t = audioCtx.currentTime;
        const step = bgmStep % 16;
        
        // Bassline
        if (step % 4 === 0) {
            const bassFreq = (step < 8) ? 130.81 : 146.83; 
            const bassOsc = audioCtx.createOscillator();
            const bassGain = audioCtx.createGain();
            bassOsc.type = 'square';
            bassOsc.frequency.setValueAtTime(bassFreq, t);
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(300, t);
            
            bassGain.gain.setValueAtTime(0, t);
            bassGain.gain.linearRampToValueAtTime(0.015, t + 0.05);
            bassGain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
            
            bassOsc.connect(filter);
            filter.connect(bassGain);
            bassGain.connect(audioCtx.destination);
            bassOsc.start(t);
            bassOsc.stop(t + 0.4);
        }
        
        // Melody
        const melodyFreq = BGM_NOTES[step];
        if (melodyFreq > 0) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(melodyFreq, t);
            
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.015, t + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(t);
            osc.stop(t + 0.2);
        }
        
        bgmStep++;
    };

    const getBaseIso = (map, x, y, z = 0) => ({
      x: (x - y) * (map.tileW / 2),
      y: (x + y) * (map.tileH / 2) - z
    });

    const toIso = (map, x, y, z = 0, camX = CANVAS_WIDTH / 2, camY = CANVAS_HEIGHT / 2) => ({
      x: (x - y) * (map.tileW / 2) + camX,
      y: (x + y) * (map.tileH / 2) - z + camY
    });

      const dx = screenX - camX;
      const dy = screenY - camY;
      return {
        x: (dx / (map.tileW / 2) + dy / (map.tileH / 2)) / 2,
        y: (dy / (map.tileH / 2) - dx / (map.tileW / 2)) / 2
      };
    };

    };

    const getPath = (startX, startY, destX, destY, doorX, baseRows, eRows) => {
        let path = [];
        const crossAbove = baseRows - 6.5; 
        const crossBelow = baseRows - 1.5;
        const crossOut = eRows + 1.5;
        const highwayX = doorX;

        const getZone = (y) => {
            if (y < baseRows - 3) return 0; 
            if (y <= eRows + 0.5) return 1; 
            return 2; 
        };

        const startZone = getZone(startY);
        const destZone = getZone(destY);
        
        const sCross = startZone === 0 ? crossAbove : startZone === 1 ? crossBelow : crossOut;
        const dCross = destZone === 0 ? crossAbove : destZone === 1 ? crossBelow : crossOut;

        if (startZone === destZone) {
            path.push({ x: startX, y: sCross });
            path.push({ x: destX, y: dCross });
            path.push({ x: destX, y: destY });
        } else {
            path.push({ x: startX, y: sCross });
            path.push({ x: highwayX, y: sCross });
            path.push({ x: highwayX, y: dCross });
            path.push({ x: destX, y: dCross });
            path.push({ x: destX, y: destY });
        }
        return path;
    };

    const getAmbientColor = (t) => {
        if (t >= 0 && t < 5) return 'rgba(15, 23, 42, 0.75)'; 
        if (t >= 5 && t < 7) { 
            const p = (t - 5) / 2;
            return `rgba(${15 + (251-15)*p}, ${23 + (146-23)*p}, ${42 + (60-42)*p}, ${0.75 - 0.45*p})`;
        }
        if (t >= 7 && t < 9) { 
            const p = (t - 7) / 2;
            return `rgba(251, 146, 60, ${0.3 - 0.3*p})`;
        }
        if (t >= 9 && t < 17) return 'rgba(0, 0, 0, 0)'; 
        if (t >= 17 && t < 19) { 
            const p = (t - 17) / 2;
            return `rgba(249, 115, 22, ${0.35 * p})`;
        }
        if (t >= 19 && t < 21) { 
            const p = (t - 19) / 2;
            return `rgba(${249 + (15-249)*p}, ${115 + (23-115)*p}, ${22 + (42-22)*p}, ${0.35 + 0.4*p})`;
        }
        if (t >= 21 && t <= 24) return 'rgba(15, 23, 42, 0.75)'; 
        return 'rgba(0,0,0,0)';
    };

    const defaultFacilitiesState = [
      { produce: 0, bakery: 0, reg1: 1, reg2: 0, security: 0, plant1: 0, plant2: 0 }, 
      { produce: 0, bakery: 0, meat: 0, electronics: 0, reg1: 1, reg2: 0, reg3: 0, security: 0, plant1: 0, statue1: 0, sign1: 0 },
      { produce: 0, bakery: 0, clothing: 0, meat: 0, electronics: 0, furniture: 0, reg1: 1, reg2: 0, reg3: 0, reg4: 0, security: 0, statue1: 0, statue2: 0, plant1: 0, plant2: 0, sign1: 0 },
      { produce: 0, meat: 0, bakery: 0, clothing: 0, electronics: 0, furniture: 0, hardware: 0, reg1: 1, reg2: 0, reg3: 0, reg4: 0, reg5: 0, security: 0, plant1: 0, plant2: 0, statue1: 0, sign1: 0 },
      { produce: 0, bakery: 0, meat: 0, clothing: 0, electronics: 0, furniture: 0, hardware: 0, toys: 0, reg1: 1, reg2: 0, reg3: 0, reg4: 0, reg5: 0, reg6: 0, security: 0, statue1: 0, statue2: 0, plant1: 0, plant2: 0, sign1: 0 }
    ];

    function SupermarketGame() {
      // --- Menu & Save State ---
      const [appMode, setAppMode] = useState('menu'); // 'menu' | 'playing'
      const [hasSaveData, setHasSaveData] = useState(false);
      const [showConfirmNew, setShowConfirmNew] = useState(false);
      
      const [hasLoaded, setHasLoaded] = useState(false);
      const [money, setMoney] = useState(500); 
      const [gems, setGems] = useState(25);
      const [incomeRate, setIncomeRate] = useState(0);
      
      // --- Settings State ---
      const [sfxOn, setSfxOn] = useState(true);
      const [bgmOn, setBgmOn] = useState(true);
      const [showSettingsModal, setShowSettingsModal] = useState(false);
      
      const [showMapModal, setShowMapModal] = useState(false);
      const [showUpgradesModal, setShowUpgradesModal] = useState(false);
      
      const [currentMapIndex, setCurrentMapIndex] = useState(0);
      const [unlockedMaps, setUnlockedMaps] = useState([true, false, false, false, false]);
      const [mapExpansions, setMapExpansions] = useState([0, 0, 0, 0, 0]); 
      const [staffCounts, setStaffCounts] = useState([0, 0, 0, 0, 0]); 
      const [facilities, setFacilities] = useState(defaultFacilitiesState);
      const [upgrades, setUpgrades] = useState({ speed: 0, truck: 0, charisma: 0 });
      
      // --- Tutorial State ---
      const [tutorialStep, setTutorialStep] = useState(0);
      const tutRef = useRef(0);

      const [nearbyFacility, setNearbyFacility] = useState(null); 
      const [selectedFacility, setSelectedFacility] = useState(null); 
      
      const [joystickPos, setJoystickPos] = useState({ x: 0, y: 0 });
      const joystickBaseRef = useRef(null);

      const canvasRef = useRef(null);
      const moneyRef = useRef(money);
      const gemsRef = useRef(gems);
      const upgradesRef = useRef(upgrades);
      const facilitiesRef = useRef(facilities);
      const mapIndexRef = useRef(currentMapIndex);
      const unlockedMapsRef = useRef(unlockedMaps);
      const mapExpansionsRef = useRef(mapExpansions);
      const staffCountsRef = useRef(staffCounts);
      const incomeTracking = useRef([]); 
      
      // Settings Toggle Functions
      const toggleSfx = () => {
          const newVal = !sfxOn;
          isSfxEnabled = newVal;
          setSfxOn(newVal);
          localStorage.setItem('supermarketSfxPref', newVal);
          if (newVal) SOUNDS.coin(); 
      };

      const toggleBgm = () => {
          const newVal = !bgmOn;
          isBgmEnabled = newVal;
          setBgmOn(newVal);
          localStorage.setItem('supermarketBgmPref', newVal);
          
          if (newVal && appMode === 'playing') {
              startBGM();
          } else {
              stopBGM();
          }
      };

      const getActiveMap = useCallback(() => {
        const mIdx = mapIndexRef.current;
        const base = MAPS[mIdx];
        const exp = mapExpansionsRef.current[mIdx] || 0;
        const eCols = base.cols + exp * 4;
        const eRows = base.rows + exp * 4;

        const dynamicFacilities = {};
        
        Object.keys(base.facilities).forEach(key => {
            const fac = base.facilities[key];
            let newFac = { ...fac };

            if (fac.type === 'store') {
                newFac.gh = fac.gh + (exp * 2);
                if (fac.gy >= 10) newFac.gy = fac.gy + (exp * 2);
            } else if (fac.type === 'decoration') {
                if (fac.gy >= 10) newFac.gy = fac.gy + (exp * 2);
            } else if (fac.type === 'register' || fac.type === 'security') {
                newFac.gy = fac.gy + (exp * 4);
            }
            dynamicFacilities[key] = newFac;
        });

        if (exp > 0) {
            const baseAisle = Object.values(base.facilities).find(f => f.type === 'store');
            const baseReg = Object.values(base.facilities).find(f => f.type === 'register');
            
            const AISLE_COLORS = [
                { top: '#c084fc', left: '#a855f7', right: '#7e22ce' }, 
                { top: '#f472b6', left: '#db2777', right: '#9d174d' }, 
                { top: '#60a5fa', left: '#3b82f6', right: '#1d4ed8' }, 
                { top: '#facc15', left: '#eab308', right: '#a16207' }
            ];
            const ITEM_COLORS = [
                {cTop:'#e879f9', cLeft:'#db2777', cRight:'#9d174d'},
                {cTop:'#38bdf8', cLeft:'#0284c7', cRight:'#0369a1'},
                {cTop:'#fde047', cLeft:'#ca8a04', cRight:'#854d0e'},
                {cTop:'#c084fc', cLeft:'#a855f7', cRight:'#7e22ce'},
            ];

            for (let i = 1; i <= exp; i++) {
                const aisleId = `exp_aisle_${i}`;
                dynamicFacilities[aisleId] = {
                    id: aisleId,
                    type: 'store',
                    name: `Bonus Aisle ${i}`,
                    gw: 2,
                    gh: baseAisle.gh + (exp * 2), 
                    gx: base.cols + (i - 1) * 4 + 1, 
                    gy: baseAisle.gy,
                    baseCost: 20000 * Math.pow(2, i),
                    baseRev: 2000 * Math.pow(1.5, i),
                    baseTimeMs: 4000,
                    costMult: 1.3,
                    colors: AISLE_COLORS[(i-1) % AISLE_COLORS.length],
                    items: [ITEM_COLORS[(i-1) % ITEM_COLORS.length]]
                };

                const regId = `exp_reg_${i}`;
                dynamicFacilities[regId] = {
                    id: regId,
                    type: 'register',
                    name: `Bonus Checkout ${i}`,
                    gw: 3,
                    gh: 2,
                    gx: base.cols + (i - 1) * 4 + 0.5,
                    gy: baseReg.gy + (exp * 4), 
                    baseCost: 10000 * Math.pow(2, i),
                    baseRev: 0,
                    baseTimeMs: 3500,
                    costMult: 1.4,
                    colors: { top: '#f8fafc', left: '#e2e8f0', right: '#94a3b8' }
                };
            }
        }

        return {
          ...base,
          cols: eCols,
          rows: eRows,
          facilities: dynamicFacilities,
          entrance: { gx: Math.floor(base.cols / 2) - 1, gy: eRows - 1 }
        };
      }, []);

      const gameState = useRef({});
      
      const resetGameState = useCallback(() => {
          const initialMap = MAPS[0];
          const initialEntrance = { gx: Math.floor(initialMap.cols/2)-1, gy: initialMap.rows - 1 };
          const initialCamX = CANVAS_WIDTH / 2 - (initialEntrance.gx - (initialEntrance.gy - 1)) * (initialMap.tileW / 2);
          const initialCamY = CANVAS_HEIGHT / 2 - (initialEntrance.gx + (initialEntrance.gy - 1)) * (initialMap.tileH / 2);

          gameState.current = {
            timeOfDay: 8.0, 
            camera: { x: initialCamX, y: initialCamY },
            player: { x: initialEntrance.gx, y: initialEntrance.gy - 1, radius: 0.4, speed: 6, target: null, path: [], wobble: 0, boxes: 0, maxBoxes: 3, interactTimer: 0 },
            keys: { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false },
            doorOpen: 0,
            npcs: [],
            staff: [], 
            guards: [],
            trash: [], 
            trucks: [], 
            lights: [], 
            supplies: 15,
            floatingTexts: [],
            particles: [],
            simData: MAPS.map(m => {
              let data = {};
              Object.keys(m.facilities).forEach(k => {
                data[k] = { stock: 0, cash: 0 };
              });
              return data;
            }),
            lastTime: performance.now(),
            nearbyThreshold: 3.0 
          };
      }, []);

      // Check for save data and sound preferences on mount
      useEffect(() => {
          const saveString = localStorage.getItem('supermarketSaveData');
          if (saveString) {
              setHasSaveData(true);
          }
          
          const savedSfx = localStorage.getItem('supermarketSfxPref');
          if (savedSfx !== null) {
              const val = savedSfx === 'true';
              isSfxEnabled = val;
              setSfxOn(val);
          }
          
          const savedBgm = localStorage.getItem('supermarketBgmPref');
          if (savedBgm !== null) {
              const val = savedBgm === 'true';
              isBgmEnabled = val;
              setBgmOn(val);
          }
      }, []);

      const getSim = (mIdx, id) => {
          if (!gameState.current.simData[mIdx]) gameState.current.simData[mIdx] = {};
          if (!gameState.current.simData[mIdx][id]) {
              gameState.current.simData[mIdx][id] = { stock: 0, cash: 0 };
          }
          return gameState.current.simData[mIdx][id];
      };

      let currentAttractiveness = 1.0;
      if (hasLoaded && appMode === 'playing') {
          const activeMap = getActiveMap();
          Object.keys(activeMap.facilities).forEach(key => {
              const fac = activeMap.facilities[key];
              const lvl = facilities[currentMapIndex][key] || 0;
              if (fac.type === 'decoration' && lvl > 0) {
                  currentAttractiveness += fac.attrBonus * lvl;
              }
          });
      }

      useEffect(() => { moneyRef.current = money; }, [money]);
      useEffect(() => { gemsRef.current = gems; }, [gems]);
      useEffect(() => { upgradesRef.current = upgrades; }, [upgrades]);
      useEffect(() => { facilitiesRef.current = facilities; }, [facilities]);
      useEffect(() => { mapIndexRef.current = currentMapIndex; }, [currentMapIndex]);
      useEffect(() => { unlockedMapsRef.current = unlockedMaps; }, [unlockedMaps]);
      useEffect(() => { mapExpansionsRef.current = mapExpansions; }, [mapExpansions]);
      useEffect(() => { staffCountsRef.current = staffCounts; }, [staffCounts]);

      // Main Menu Actions
      const handleContinueGame = () => {
          SOUNDS.buy(); // Play sound on entering game
          if (isBgmEnabled) startBGM();
          setTutorialStep(0); tutRef.current = 0; // Ensure no tutorial on load
          try {
              const saveString = localStorage.getItem('supermarketSaveData');
              if (saveString) {
                  const saveData = JSON.parse(saveString);
                  
                  resetGameState(); // prep the ref

                  if (saveData.money !== undefined) setMoney(saveData.money);
                  if (saveData.gems !== undefined) setGems(saveData.gems);
                  if (saveData.upgrades !== undefined) setUpgrades(saveData.upgrades);
                  if (saveData.supplies !== undefined) gameState.current.supplies = saveData.supplies;
                  if (saveData.timeOfDay !== undefined) gameState.current.timeOfDay = saveData.timeOfDay;
                  
                  if (saveData.unlockedMaps) {
                      let u = [...saveData.unlockedMaps];
                      while(u.length < MAPS.length) u.push(false);
                      setUnlockedMaps(u);
                  }
                  if (saveData.mapExpansions) {
                      let e = [...saveData.mapExpansions];
                      while(e.length < MAPS.length) e.push(0);
                      setMapExpansions(e);
                  }
                  if (saveData.staffCounts) {
                      let s = [...saveData.staffCounts];
                      while(s.length < MAPS.length) s.push(0);
                      setStaffCounts(s);
                  }
                  if (saveData.facilities) {
                      let savedFacs = saveData.facilities;
                      let newFacs = defaultFacilitiesState.map((df, i) => {
                          if (savedFacs[i]) return { ...df, ...savedFacs[i] };
                          return df;
                      });
                      setFacilities(newFacs);
                  }
                  if (saveData.simData) {
                      let savedSim = saveData.simData;
                      gameState.current.simData = MAPS.map((m, i) => {
                          let data = {};
                          Object.keys(m.facilities).forEach(k => {
                             data[k] = (savedSim[i] && savedSim[i][k]) ? savedSim[i][k] : { stock: 0, cash: 0 };
                          });
                          return data;
                      });
                  }
                  
                  if (saveData.currentMapIndex !== undefined) {
                     setCurrentMapIndex(saveData.currentMapIndex);
                     // Set map specific data
                     setTimeout(() => {
                       const activeMap = getActiveMap();
                       gameState.current.player.x = activeMap.entrance.gx;
                       gameState.current.player.y = activeMap.entrance.gy - 1;
                       gameState.current.player.path = [];
                       gameState.current.player.boxes = 0;
                       gameState.current.camera.x = CANVAS_WIDTH / 2 - (activeMap.entrance.gx - (activeMap.entrance.gy - 1)) * (activeMap.tileW / 2);
                       gameState.current.camera.y = CANVAS_HEIGHT / 2 - (activeMap.entrance.gx + (activeMap.entrance.gy - 1)) * (activeMap.tileH / 2);
                       
                       const staffCount = saveData.staffCounts?.[saveData.currentMapIndex] || 0;
                       gameState.current.staff = Array(staffCount).fill(0).map((_, i) => ({
                          id: Date.now() + i,
                          x: activeMap.entrance.gx + (Math.random()*4 - 2),
                          y: activeMap.entrance.gy - 2 - Math.random()*2,
                          speed: 4, boxes: 0, maxBoxes: 3, path: [], moveTimeout: 0,
                          target: null, targetFacility: null, state: 'IDLE', timer: Math.random(), wobble: 0
                       }));
                     }, 0);
                  }
                  
                  setTimeout(() => {
                     const map = getActiveMap();
                     const basePos = getBaseIso(map, gameState.current.player.x, gameState.current.player.y, 80);
                     gameState.current.floatingTexts.push({ bx: basePos.x, by: basePos.y, text: "Game Loaded!", color: '#3b82f6', life: 2.0 });
                  }, 500);
              }
          } catch (e) {
              console.error("Failed to parse save game:", e);
              resetGameState(); // Fallback if save is corrupt
          }
          setHasLoaded(true);
          setAppMode('playing');
      };

      const handleStartNewGame = () => {
          SOUNDS.buy(); // Play sound on starting game
          if (isBgmEnabled) startBGM();
          localStorage.removeItem('supermarketSaveData');
          setHasSaveData(false);
          setShowConfirmNew(false);
          
          setMoney(500);
          setGems(25);
          setUnlockedMaps([true, false, false, false, false]);
          setMapExpansions([0, 0, 0, 0, 0]);
          setStaffCounts([0, 0, 0, 0, 0]);
          setFacilities(defaultFacilitiesState);
          setUpgrades({ speed: 0, truck: 0, charisma: 0 });
          setCurrentMapIndex(0);
          
          resetGameState();
          setTutorialStep(1); tutRef.current = 1; // Start tutorial
          
          setTimeout(() => {
             const activeMap = getActiveMap();
             gameState.current.player.x = activeMap.entrance.gx;
             gameState.current.player.y = activeMap.entrance.gy - 1;
             gameState.current.camera.x = CANVAS_WIDTH / 2 - (activeMap.entrance.gx - (activeMap.entrance.gy - 1)) * (activeMap.tileW / 2);
             gameState.current.camera.y = CANVAS_HEIGHT / 2 - (activeMap.entrance.gx + (activeMap.entrance.gy - 1)) * (activeMap.tileH / 2);
          }, 0);

          setHasLoaded(true);
          setAppMode('playing');
      };

      const checkNewGameClick = () => {
          if (hasSaveData) {
              setShowConfirmNew(true);
          } else {
              handleStartNewGame();
          }
      };

      // AUTO SAVE HOOK
      useEffect(() => {
        if (!hasLoaded || appMode !== 'playing') return; 

        const saveGame = () => {
          const saveData = {
            money: moneyRef.current,
            gems: gemsRef.current,
            upgrades: upgradesRef.current,
            currentMapIndex: mapIndexRef.current,
            unlockedMaps: unlockedMapsRef.current,
            mapExpansions: mapExpansionsRef.current,
            staffCounts: staffCountsRef.current,
            facilities: facilitiesRef.current,
            simData: gameState.current.simData,
            supplies: gameState.current.supplies,
            timeOfDay: gameState.current.timeOfDay
          };
          localStorage.setItem('supermarketSaveData', JSON.stringify(saveData));
          setHasSaveData(true);
        };

        const intervalId = setInterval(saveGame, 5000); 
        window.addEventListener('beforeunload', saveGame); 

        return () => {
          clearInterval(intervalId);
          window.removeEventListener('beforeunload', saveGame);
        };
      }, [hasLoaded, appMode]);

      const addMoney = useCallback((amount) => {
        setMoney(prev => prev + amount);
        incomeTracking.current.push({ time: performance.now(), amount });
      }, []);

      const addGems = useCallback((amount) => {
        setGems(prev => prev + amount);
      }, []);

      useEffect(() => {
        if (appMode !== 'playing') return;
        const interval = setInterval(() => {
          const now = performance.now();
          incomeTracking.current = incomeTracking.current.filter(i => now - i.time < 10000);
          const totalRecent = incomeTracking.current.reduce((sum, i) => sum + i.amount, 0);
          setIncomeRate(Math.floor((totalRecent / 10) * 60));
        }, 1000);
        return () => clearInterval(interval);
      }, [appMode]);

      const handleTouchStart = (e) => {
          e.stopPropagation();
          updateJoystick(e.touches[0]);
      };
      const handleTouchMove = (e) => {
          e.stopPropagation();
          updateJoystick(e.touches[0]);
      };
      const handleTouchEnd = (e) => {
          e.stopPropagation();
          setJoystickPos({ x: 0, y: 0 });
          gameState.current.keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };
      };
      
      const updateJoystick = (touch) => {
          if (!joystickBaseRef.current) return;
          const rect = joystickBaseRef.current.getBoundingClientRect();
          const centerX = rect.left + rect.width / 2;
          const centerY = rect.top + rect.height / 2;
          const dx = touch.clientX - centerX;
          const dy = touch.clientY - centerY;
          const dist = Math.hypot(dx, dy);
          const maxDist = rect.width / 2 - 20;

          let clampedX = dx;
          let clampedY = dy;
          if (dist > maxDist) {
              clampedX = (dx / dist) * maxDist;
              clampedY = (dy / dist) * maxDist;
          }
          setJoystickPos({ x: clampedX, y: clampedY });

          const threshold = 15;
          gameState.current.keys.a = dx < -threshold;
          gameState.current.keys.d = dx > threshold;
          gameState.current.keys.w = dy < -threshold;
          gameState.current.keys.s = dy > threshold;
          
          gameState.current.player.path = [];
          gameState.current.player.target = null;
      };

      const handleBuyUpgrade = (id) => {
          const data = UPGRADES_DB[id];
          const curLevel = upgrades[id];
          if (curLevel >= data.maxLevel) return;
          
          const cost = Math.floor(data.baseCost * Math.pow(data.costMult, curLevel));
          if (gems >= cost) {
              SOUNDS.buy(); // Sound on upgrade
              setGems(prev => prev - cost);
              setUpgrades(prev => ({ ...prev, [id]: curLevel + 1 }));
          } else {
              SOUNDS.error(); // Sound if can't afford
          }
      };

      const handleTravel = (index) => {
        const mapData = MAPS[index];
        if (!unlockedMaps[index] && money >= mapData.unlockCost) {
          SOUNDS.buy(); // Sound on unlock
          setMoney(prev => prev - mapData.unlockCost);
          setUnlockedMaps(prev => { const n = [...prev]; n[index] = true; return n; });
        } else if (!unlockedMaps[index] && money < mapData.unlockCost) {
          SOUNDS.error();
          return;
        }
        
        if (unlockedMaps[index] || money >= mapData.unlockCost) {
          setCurrentMapIndex(index);
          
          setTimeout(() => {
            const activeMap = getActiveMap();
            gameState.current.player.x = activeMap.entrance.gx;
            gameState.current.player.y = activeMap.entrance.gy - 1;
            gameState.current.player.path = [];
            gameState.current.player.target = null;
            gameState.current.player.boxes = 0;
            
            gameState.current.camera.x = CANVAS_WIDTH / 2 - (activeMap.entrance.gx - (activeMap.entrance.gy - 1)) * (activeMap.tileW / 2);
            gameState.current.camera.y = CANVAS_HEIGHT / 2 - (activeMap.entrance.gx + (activeMap.entrance.gy - 1)) * (activeMap.tileH / 2);
            
            gameState.current.staff = Array(staffCountsRef.current[index]).fill(0).map((_, i) => ({
                id: Date.now() + i,
                x: activeMap.entrance.gx + (Math.random()*4 - 2),
                y: activeMap.entrance.gy - 2 - Math.random()*2,
                speed: 4, boxes: 0, maxBoxes: 3, path: [], moveTimeout: 0,
                target: null, targetFacility: null, state: 'IDLE', timer: Math.random(), wobble: 0
            }));

            gameState.current.npcs = [];
            gameState.current.guards = [];
            gameState.current.trash = [];
            gameState.current.trucks = [];
            gameState.current.floatingTexts = [];
            setSelectedFacility(null); 
            setShowMapModal(false);
          }, 0);
        }
      };

      const handleExpandStore = () => {
        const cost = 2000 * Math.pow(3, mapExpansions[currentMapIndex]);
        if (money >= cost) {
          SOUNDS.buy(); // Expand sound
          setMoney(prev => prev - cost);
          setMapExpansions(prev => {
            const next = [...prev];
            next[currentMapIndex] += 1;
            return next;
          });
          
          const activeMap = getActiveMap();
          const basePos = getBaseIso(activeMap, activeMap.cols/2, activeMap.rows/2, 100);
          gameState.current.floatingTexts.push({ bx: basePos.x, by: basePos.y, text: "Store Expanded!", color: '#fbbf24', life: 2.5 });
        }
      };

      const handleHireStaff = () => {
        const currentMaxStaff = BASE_MAX_STAFF + (mapExpansions[currentMapIndex] || 0) * 2;
        if (staffCounts[currentMapIndex] >= currentMaxStaff) return; 

        const cost = 1000 * Math.pow(2, staffCounts[currentMapIndex]);
        if (money >= cost) {
          SOUNDS.buy(); // Hire sound
          setMoney(prev => prev - cost);
          setStaffCounts(prev => {
            const next = [...prev];
            next[currentMapIndex] += 1;
            return next;
          });
          
          const activeMap = getActiveMap();
          gameState.current.staff.push({
             id: Date.now(),
             x: activeMap.entrance.gx + (Math.random()*4 - 2),
             y: activeMap.entrance.gy - 2 - Math.random()*2,
             speed: 4, boxes: 0, maxBoxes: 3, path: [], moveTimeout: 0,
             target: null, targetFacility: null, state: 'IDLE', timer: 0, wobble: 0
          });

          const basePos = getBaseIso(activeMap, activeMap.cols/2, activeMap.rows/2, 100);
          gameState.current.floatingTexts.push({ bx: basePos.x, by: basePos.y, text: "Staff Hired!", color: '#4ade80', life: 2.5 });
        }
      };

      const handleInteract = () => {
        if (!selectedFacility) return; 
        const activeMap = getActiveMap();
        const data = activeMap.facilities[selectedFacility];
        const level = facilities[currentMapIndex][selectedFacility] || 0;
        const cost = level === 0 ? data.baseCost : Math.floor(data.baseCost * Math.pow(data.costMult, level));

        if (money >= cost) {
          SOUNDS.buy(); // Build/Upgrade sound
          setMoney(prev => prev - cost);
          
          setFacilities(prev => {
            const next = [...prev];
            next[currentMapIndex] = { ...next[currentMapIndex], [selectedFacility]: level + 1 };
            return next;
          });
          
          if (data.type === 'store') {
             const sim = getSim(currentMapIndex, selectedFacility);
             sim.stock = Math.floor(data.gh * 2.5) + (level+1)*10;
          }

          const basePos = getBaseIso(activeMap, data.gx + data.gw/2, data.gy + data.gh/2, 50);
          gameState.current.floatingTexts.push({ bx: basePos.x, by: basePos.y, text: level === 0 ? "Built!" : "Level Up!", color: '#ffffff', life: 1.5 });

          for(let i=0; i<30; i++) {
            gameState.current.particles.push({
              bx: basePos.x, by: basePos.y, vx: (Math.random() - 0.5) * 300, vy: (Math.random() - 0.5) * 300 - 150,
              color: ['#fbbf24', '#ffffff', data.colors.top][Math.floor(Math.random() * 3)],
              life: 1.0 + Math.random(), size: 4 + Math.random() * 6
            });
          }
        } else {
            SOUNDS.error();
        }
      };

      useEffect(() => {
        if (appMode !== 'playing') return;
        const handleKeyDown = (e) => { if (gameState.current.keys.hasOwnProperty(e.key)) gameState.current.keys[e.key] = true; };
        const handleKeyUp = (e) => { if (gameState.current.keys.hasOwnProperty(e.key)) gameState.current.keys[e.key] = false; };
        window.addEventListener('keydown', handleKeyDown); window.addEventListener('keyup', handleKeyUp);
        return () => { window.removeEventListener('keydown', handleKeyDown); window.removeEventListener('keyup', handleKeyUp); };
      }, [appMode]);

      const handlePointerDown = (e) => {
        // Init audio context on first user click just in case
        initAudio();
        
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const activeMap = getActiveMap();
        const mIdx = mapIndexRef.current;
        const scaleX = CANVAS_WIDTH / rect.width;
        const scaleY = CANVAS_HEIGHT / rect.height;
        
        const worldPos = toWorld(
           activeMap, 
           (e.clientX - rect.left) * scaleX, 
           (e.clientY - rect.top) * scaleY, 
           gameState.current.camera.x, 
           gameState.current.camera.y
        );

        let clickedShoplifter = null;
        for (let i = 0; i < gameState.current.npcs.length; i++) {
            const npc = gameState.current.npcs[i];
            if (npc.isShoplifter && npc.state === 'FLEEING_MOVE') {
                if (getDistance(worldPos.x, worldPos.y, npc.x, npc.y) < 2.0) {
                    clickedShoplifter = i;
                    break;
                }
            }
        }

        if (clickedShoplifter !== null) {
            const npc = gameState.current.npcs[clickedShoplifter];
            gameState.current.npcs.splice(clickedShoplifter, 1);
            addMoney(50);
            SOUNDS.coin(); // Catch shoplifter sound
            const bPos = getBaseIso(activeMap, npc.x, npc.y, 45);
            gameState.current.floatingTexts.push({ bx: bPos.x, by: bPos.y, text: "Busted! +$50", color: '#4ade80', life: 1.5 });
            return; 
        }
        
        let clickedFac = null;
        const sortedFacs = Object.values(activeMap.facilities).sort((a,b) => (b.gx + b.gy) - (a.gx + a.gy));
        
        for (const fac of sortedFacs) {
          if (worldPos.x >= fac.gx - 1.5 && worldPos.x <= fac.gx + fac.gw &&
              worldPos.y >= fac.gy - 1.5 && worldPos.y <= fac.gy + fac.gh) {
              clickedFac = fac.id;
              break;
          }
        }

        if (clickedFac) {
          setSelectedFacility(clickedFac); 
          gameState.current.player.path = []; 
        } else {
          setSelectedFacility(null); 
          
          let destX = Math.max(0.5, Math.min(activeMap.cols - 0.5, worldPos.x));
          let destY = Math.max(0.5, Math.min(activeMap.rows + 7.0, worldPos.y)); 

          const dzX = activeMap.entrance.gx - 3.75;
          const dzY = activeMap.rows + 1.25;
          if (destX > dzX - 1.25 && destX < dzX + 1.25 && destY > dzY - 0.75 && destY < dzY + 0.75) {
              destY = dzY + 1.5; 
          }
          
          gameState.current.player.path = getPath(
              gameState.current.player.x, gameState.current.player.y, 
              destX, destY, 
              activeMap.entrance.gx + 1.1, MAPS[mIdx].rows, activeMap.rows
          );
        }
      };

      useEffect(() => {
        if (!hasLoaded || appMode !== 'playing') return; 

        let animationFrameId;
        const frameDelay = 1000 / TARGET_FPS;
        let lastRenderTime = performance.now();

        const gameLoop = (currentTime) => {
          animationFrameId = requestAnimationFrame(gameLoop);
          
          const elapsed = currentTime - lastRenderTime;
          if (elapsed < frameDelay) return;
          lastRenderTime = currentTime - (elapsed % frameDelay);

          const dt = Math.min((currentTime - gameState.current.lastTime) / 1000, 0.1);
          gameState.current.lastTime = currentTime;
          update(dt);
          draw();
        };

        const update = (dt) => {
          const state = gameState.current;
          const { player, keys, camera, staff, trash, trucks } = state;
          const mIdx = mapIndexRef.current;
          const map = getActiveMap();
          const baseRows = MAPS[mIdx].rows;
          const eCols = map.cols;
          const eRows = map.rows;
          const eEntrance = map.entrance;
          const facLevels = facilitiesRef.current[mIdx] || {};

          // --- Guard Spawn Logic ---
          if (state.guards === undefined) state.guards = [];
          const secLvl = facLevels['security'] || 0;
          if (secLvl > 0 && state.guards.length === 0) {
              const secFac = map.facilities['security'];
              if (secFac) {
                  state.guards.push({
                      id: 'guard_1',
                      x: secFac.gx + secFac.gw/2,
                      y: secFac.gy + secFac.gh/2 + 1,
                      speed: 4 + (secLvl * 0.5),
                      catchRadius: 2 + (secLvl * 1.5),
                      state: 'IDLE',
                      path: [], target: null, wobble: 0, timer: 0, moveTimeout: 0
                  });
              }
          } else if (secLvl === 0 && state.guards.length > 0) {
              state.guards = [];
          }

          // --- Tutorial Progress Check ---
          if (tutRef.current === 1 && (keys.w || keys.a || keys.s || keys.d || keys.ArrowUp || keys.ArrowDown || keys.ArrowLeft || keys.ArrowRight || player.path.length > 0)) {
              tutRef.current = 2; setTutorialStep(2); SOUNDS.tutorial();
          }
          if (tutRef.current === 2) {
              const hasBuiltStore = Object.keys(facLevels).some(id => facLevels[id] > 0 && map.facilities[id].type === 'store');
              if (hasBuiltStore) { tutRef.current = 3; setTutorialStep(3); SOUNDS.tutorial(); }
          }
          if (tutRef.current === 4 && player.boxes > 0) {
              tutRef.current = 5; setTutorialStep(5); SOUNDS.tutorial();
          }

          const curSpeedLvl = upgradesRef.current?.speed || 0;
          const curTruckLvl = upgradesRef.current?.truck || 0;
          const curCharismaLvl = upgradesRef.current?.charisma || 0;
          
          player.speed = 6 * (1 + (curSpeedLvl * 0.2));

          state.timeOfDay += dt * 0.1;
          if (state.timeOfDay >= 24) state.timeOfDay -= 24;
          const isStoreOpen = state.timeOfDay >= 6 && state.timeOfDay < 22;

          const clockEl = document.getElementById('game-clock');
          if (clockEl) {
              const h = Math.floor(state.timeOfDay);
              const m = Math.floor((state.timeOfDay - h) * 60);
              const ampm = h >= 12 && h < 24 ? 'PM' : 'AM';
              const displayH = h % 12 === 0 ? 12 : h % 12;
              const displayM = m.toString().padStart(2, '0');
              clockEl.innerText = `${displayH}:${displayM} ${ampm}`;
              
              const statusEl = document.getElementById('store-status');
              if (statusEl) {
                  statusEl.innerText = isStoreOpen ? 'OPEN' : 'CLOSED';
                  statusEl.className = `font-black text-xs md:text-sm ml-1 md:ml-2 ${isStoreOpen ? 'text-green-400' : 'text-red-400'}`;
              }
          }

          let attrMult = 1.0;
          Object.keys(map.facilities).forEach(key => {
              const fac = map.facilities[key];
              const lvl = facLevels[key] || 0;
              if (fac.type === 'decoration' && lvl > 0) {
                  attrMult += fac.attrBonus * lvl;
              }
          });

          if (player.boxes === undefined) player.boxes = 0;
          if (player.maxBoxes === undefined) player.maxBoxes = 3;
          if (player.interactTimer === undefined) player.interactTimer = 0;
          if (state.supplies === undefined) state.supplies = 15;
          if (!state.trash) state.trash = [];
          if (!state.trucks) state.trucks = [];

          const targetCamX = CANVAS_WIDTH / 2 - (player.x - player.y) * (map.tileW / 2);
          const targetCamY = CANVAS_HEIGHT / 2 - (player.x + player.y) * (map.tileH / 2);
          camera.x += (targetCamX - camera.x) * 5 * dt;
          camera.y += (targetCamY - camera.y) * 5 * dt;

          const dzX = eEntrance.gx - 3.75;
          const dzY = eRows + 1.25;
          let moneySpentThisFrame = 0;

          const truckSpawnRate = isStoreOpen ? 0.003 : 0.01;
          if (trucks.length === 0 && state.supplies < 10 && Math.random() < truckSpawnRate) {
              trucks.push({
                  x: dzX - 0.4, y: eRows + 14, speed: 4.5, state: 'ARRIVING', timer: 0, particleTimer: 0
              });
          }

          for (let i = trucks.length - 1; i >= 0; i--) {
              const t = trucks[i];
              if (t.state === 'ARRIVING') {
                  t.y -= t.speed * dt;
                  if (t.y <= dzY + 0.6) {
                      t.y = dzY + 0.6; t.state = 'WAITING';
                  }
              } else if (t.state === 'UNLOADING') {
                  t.timer -= dt; t.particleTimer += dt;
                  const totalBoxesToDrop = 10 + (curTruckLvl * 5);
                  const dropInterval = 3.0 / totalBoxesToDrop;

                  if (t.particleTimer > dropInterval) {
                      t.particleTimer -= dropInterval; 
                      state.supplies++; 
                      const bPos = getBaseIso(map, t.x + 0.9, t.y + 1.5, 40);
                      state.floatingTexts.push({ bx: bPos.x, by: bPos.y, text: "📦", color: '#fff', life: 0.6 });
                  }
                  if (t.timer <= 0) t.state = 'LEAVING';
              } else if (t.state === 'LEAVING') {
                  t.y += t.speed * dt;
                  if (t.y > eRows + 14) trucks.splice(i, 1);
              }
          }

          const constrainEntity = (ent) => {
              const r = 0.35; 
              ent.x = Math.max(0.5, Math.min(eCols - 0.6, ent.x));
              ent.y = Math.max(0.5, Math.min(eRows + 6.8, ent.y)); 

              const resolveAABB = (bx, by, bw, bh) => {
                  if (ent.x + r > bx && ent.x - r < bx + bw && ent.y + r > by && ent.y - r < by + bh) {
                      const overlapLeft = (ent.x + r) - bx;
                      const overlapRight = (bx + bw) - (ent.x - r);
                      const overlapTop = (ent.y + r) - by;
                      const overlapBottom = (by + bh) - (ent.y - r);

                      const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
                      if (minOverlap === overlapLeft) ent.x -= overlapLeft;
                      else if (minOverlap === overlapRight) ent.x += overlapRight;
                      else if (minOverlap === overlapTop) ent.y -= overlapTop;
                      else if (minOverlap === overlapBottom) ent.y += overlapBottom;
                  }
              };

              const doorLeft = eEntrance.gx - 0.2;
              const doorRight = eEntrance.gx + 2.2;
              const inDoorGap = ent.x > doorLeft && ent.x < doorRight;

              if (!inDoorGap) {
                  const wallInside = eRows - 0.6;
                  const wallOutside = eRows + 0.4;
                  if (ent.y > wallInside && ent.y < wallOutside) {
                      if (ent.y < eRows - 0.1) ent.y = wallInside;
                      else ent.y = wallOutside;
                  }
              }

              Object.values(map.facilities).forEach(fac => {
                  if ((facLevels[fac.id] || 0) > 0) resolveAABB(fac.gx, fac.gy, fac.gw, fac.gh);
              });
              
              resolveAABB(dzX - 1.25, dzY - 0.75, 2.5, 1.5);
              
              for (let px = 0; px < eCols; px += 3) {
                 if (px >= eEntrance.gx - 4 && px <= eEntrance.gx + 2) continue;
                 if ((px * 17) % 5 === 0) continue; 
                 resolveAABB(px + 0.2, eRows + 1.5, 1.6, 2.6);
              }
              trucks.forEach(t => resolveAABB(t.x, t.y, 1.8, 4.5));
          };

          const moveEntity = (ent) => {
              if (ent.path && ent.path.length > 0) ent.target = ent.path[0];
              if (!ent.target) return false;

              let moved = false;
              const speed = ent.speed * dt;
              const dx = ent.target.x - ent.x;
              const dy = ent.target.y - ent.y;
              const dist = Math.hypot(dx, dy);

              if (dist > 0.2) { 
                  const stepX = (dx / dist) * Math.min(speed, dist);
                  const stepY = (dy / dist) * Math.min(speed, dist);
                  
                  const oldX = ent.x;
                  ent.x += stepX;
                  constrainEntity(ent);
                  const movedX = Math.abs(ent.x - oldX) > 0.001;

                  const oldY = ent.y;
                  ent.y += stepY;
                  constrainEntity(ent);
                  const movedY = Math.abs(ent.y - oldY) > 0.001;

                  if (!movedX && !movedY) {
                      ent.x += (dy / dist) * speed * 0.8;
                      constrainEntity(ent);
                      ent.y -= (dx / dist) * speed * 0.8;
                      constrainEntity(ent);
                  }
                  moved = true;
              } else {
                  if (ent.path && ent.path.length > 0) {
                      ent.path.shift();
                      if (ent.path.length > 0) {
                          ent.target = ent.path[0];
                          moved = true;
                      } else {
                          ent.target = null;
                      }
                  } else {
                      ent.target = null;
                  }
              }
              if (moved) ent.wobble += dt * 12; else ent.wobble = 0;
              return moved;
          };

          let vx = 0, vy = 0;
          if (keys.w || keys.ArrowUp) { vx -= 1; vy -= 1; }
          if (keys.s || keys.ArrowDown) { vx += 1; vy += 1; }
          if (keys.a || keys.ArrowLeft) { vx -= 1; vy += 1; }
          if (keys.d || keys.ArrowRight) { vx += 1; vy -= 1; }

          const prevWobble = player.wobble; 

          if (vx !== 0 || vy !== 0) {
              player.path = [];
              player.target = null;
              const len = Math.hypot(vx, vy);
              const stepX = (vx / len) * player.speed * dt;
              const stepY = (vy / len) * player.speed * dt;
              
              player.x += stepX;
              constrainEntity(player);
              player.y += stepY;
              constrainEntity(player);

              player.wobble += dt * 18;
          } else {
              moveEntity(player);
          }

          if (Math.floor(player.wobble / Math.PI) > Math.floor(prevWobble / Math.PI)) {
              SOUNDS.step();
          }

          let minDistToDoor = 999;
          const doorCenterX = eEntrance.gx + 1;
          const doorCenterY = eRows;
          [state.player, ...state.staff, ...state.guards, ...state.npcs].forEach(ent => {
              const d = getDistance(ent.x, ent.y, doorCenterX, doorCenterY);
              if (d < minDistToDoor) minDistToDoor = d;
          });
          let targetDoorOpen = Math.max(0, Math.min(1, (3.5 - minDistToDoor)));
          if (state.doorOpen === undefined) state.doorOpen = 0;
          state.doorOpen += (targetDoorOpen - state.doorOpen) * 10 * dt;
          
          let closestFacility = null;
          let minDistance = state.nearbyThreshold;
          let cashCollectedThisFrame = 0;
          let isInteracting = false;

          if (getDistance(player.x, player.y, dzX, dzY) < 2.5) {
              const waitingTruck = trucks.find(t => t.state === 'WAITING');
              
              if (waitingTruck && moneyRef.current >= 20) {
                  isInteracting = true;
                  player.interactTimer += dt;
                  if (player.interactTimer > 0.8) {
                      moneySpentThisFrame += 20;
                      waitingTruck.state = 'UNLOADING';
                      waitingTruck.timer = 3.0; 
                      player.interactTimer = 0;
                      SOUNDS.place(); 
                      const bPos = getBaseIso(map, waitingTruck.x + 0.9, waitingTruck.y + 1.5, 60);
                      state.floatingTexts.push({ bx: bPos.x, by: bPos.y, text: "-$20", color: '#ef4444', life: 1.0 });
                  }
              } 
              else if (!waitingTruck && player.boxes < player.maxBoxes && state.supplies > 0) {
                  isInteracting = true;
                  player.interactTimer += dt;
                  if (player.interactTimer > 0.4) {
                      player.boxes++;
                      state.supplies--;
                      player.interactTimer = 0;
                      SOUNDS.place(); 
                      const pPos = getBaseIso(map, player.x, player.y, 45);
                      state.floatingTexts.push({ bx: pPos.x, by: pPos.y, text: "+📦", color: '#fcd34d', life: 0.8 });
                  }
              }
          }

          Object.values(map.facilities).forEach(fac => {
            let dist;
            if (fac.type === 'store' || fac.type === 'security' || fac.type === 'decoration') {
                const clampX = Math.max(fac.gx, Math.min(player.x, fac.gx + fac.gw));
                const clampY = Math.max(fac.gy, Math.min(player.y, fac.gy + fac.gh));
                dist = getDistance(player.x, player.y, clampX, clampY);
            } else {
                const interactX = fac.gx + fac.gw / 2;
                const interactY = fac.gy - 0.5;
                dist = getDistance(player.x, player.y, interactX, interactY);
            }
            
            if (dist < minDistance) { minDistance = dist; closestFacility = fac.id; }

            if (dist <= 2.0 && (facLevels[fac.id]||0) > 0) {
               const sim = getSim(mIdx, fac.id);
               const basePos = getBaseIso(map, fac.gx + fac.gw/2, fac.gy + fac.gh/2, 60);

               if (fac.type === 'store') {
                 const maxStock = Math.floor(fac.gh * 2.5) + facLevels[fac.id] * 10;
                 if (sim.stock < maxStock && player.boxes > 0) {
                    isInteracting = true;
                    player.interactTimer += dt;
                    if (player.interactTimer > 0.3) {
                       player.boxes--;
                       sim.stock = Math.min(maxStock, sim.stock + 15);
                       player.interactTimer = 0;
                       SOUNDS.place(); 
                       state.floatingTexts.push({ bx: basePos.x, by: basePos.y, text: "📦 Placed!", color: '#3b82f6', life: 0.8 });
                       
                       if (tutRef.current === 5) { tutRef.current = 6; setTutorialStep(6); SOUNDS.tutorial(); }
                    }
                 }
               } else if (fac.type === 'register') {
                 if (sim.cash > 0) {
                    isInteracting = true;
                    player.interactTimer += dt;
                    if (player.interactTimer > 0.2) {
                       cashCollectedThisFrame += sim.cash;
                       SOUNDS.coin(); 
                       state.floatingTexts.push({ bx: basePos.x, by: basePos.y, text: `+$${sim.cash}`, color: '#4ade80', life: 1.2 });
                       sim.cash = 0;
                       player.interactTimer = 0;
                       
                       if (tutRef.current === 3) { tutRef.current = 4; setTutorialStep(4); SOUNDS.tutorial(); }
                    }
                 }
               }
            }
          });
          
          setNearbyFacility(prev => prev !== closestFacility ? closestFacility : prev);

          for (let i = state.trash.length - 1; i >= 0; i--) {
              const t = state.trash[i];
              if (getDistance(player.x, player.y, t.x, t.y) < 1.5) {
                  isInteracting = true;
                  t.progress += dt * 1.5; 
                  if (t.progress >= 1.0) {
                      state.trash.splice(i, 1);
                      cashCollectedThisFrame += 2; 
                      SOUNDS.trash(); 
                      let extraDrop = "";
                      if (Math.random() < 0.15) {
                          addGems(1);
                          extraDrop = " +1💎";
                      }
                      const pPos = getBaseIso(map, t.x, t.y, 45);
                      state.floatingTexts.push({ bx: pPos.x, by: pPos.y, text: `Cleaned! +$2${extraDrop}`, color: '#4ade80', life: 1.0 });
                  }
              }
          }

          if (!isInteracting) {
              player.interactTimer = 0; 
          }

          // --- Guard AI ---
          state.guards.forEach(g => {
              g.speed = 4 + (secLvl * 0.5);
              g.catchRadius = 2 + (secLvl * 1.5);
              
              let targetThief = null;
              let minDistToThief = 999;
              
              for(let i=0; i<state.npcs.length; i++) {
                  const npc = state.npcs[i];
                  if (npc.isShoplifter && npc.state === 'FLEEING_MOVE') {
                      const dist = getDistance(g.x, g.y, npc.x, npc.y);
                      if (dist < minDistToThief && dist < 15) { 
                          minDistToThief = dist;
                          targetThief = npc;
                      }
                  }
              }

              if (targetThief) {
                  g.state = 'CHASING';
                  g.path = getPath(g.x, g.y, targetThief.x, targetThief.y, eEntrance.gx + 1.1, baseRows, eRows);
                  g.speed = 5 + (secLvl * 0.8); 
              } else {
                  if (g.state === 'CHASING') {
                      g.state = 'IDLE'; g.timer = 0.5; g.path = [];
                  }
              }

              if (g.state.includes('MOVE') || g.state === 'CHASING') {
                   g.moveTimeout += dt;
                   if (g.moveTimeout > 15.0 && g.state !== 'CHASING') { 
                       g.state = 'IDLE'; g.timer = 1.0; g.path = []; g.moveTimeout = 0;
                   }
              } else {
                   g.moveTimeout = 0;
              }

              if (g.state === 'IDLE') {
                  g.timer -= dt;
                  if (g.timer <= 0) {
                      g.timer = 1.0;
                      if (Math.random() < 0.5) {
                          const targetX = Math.max(1.5, Math.min(eCols - 1.5, g.x + (Math.random()*12 - 6)));
                          const targetY = Math.max(1.5, Math.min(eRows - 1.5, g.y + (Math.random()*12 - 6)));
                          g.path = getPath(g.x, g.y, targetX, targetY, eEntrance.gx + 1.1, baseRows, eRows);
                          g.state = 'WANDERING_MOVE';
                      }
                  }
              } else if (g.state === 'WANDERING_MOVE' || g.state === 'CHASING') {
                  if (!moveEntity(g)) { 
                      if (g.state === 'WANDERING_MOVE') { g.state = 'IDLE'; g.timer = 1.0; }
                  }
              }
          });

          // --- Staff AI ---
          for (let i = 0; i < staff.length; i++) {
             const s = staff[i];
             if (s.boxes === undefined) s.boxes = 0;
             if (s.maxBoxes === undefined) s.maxBoxes = 3;
             if (s.moveTimeout === undefined) s.moveTimeout = 0;

             if (s.state.includes('MOVE')) {
                 s.moveTimeout += dt;
                 if (s.moveTimeout > 15.0) { 
                     s.state = 'IDLE'; s.timer = 1.0; s.path = []; s.moveTimeout = 0;
                 }
             } else {
                 s.moveTimeout = 0;
             }

             if (s.state === 'IDLE') {
                s.timer -= dt;
                if (s.timer <= 0) {
                   let candidates = [];
                   Object.values(map.facilities).forEach(fac => {
                      if ((facLevels[fac.id]||0) > 0) {
                         const sim = getSim(mIdx, fac.id);
                         if (fac.type === 'store') {
                            const maxStock = Math.floor(fac.gh * 2.5) + facLevels[fac.id] * 10;
                            if (sim.stock < maxStock * 0.5) candidates.push({ id: fac.id, fac });
                         } else if (fac.type === 'register') {
                            if (sim.cash > 0 && s.boxes === 0) candidates.push({ id: fac.id, fac }); 
                         }
                      }
                   });

                   if (candidates.length > 0) {
                      const task = candidates[Math.floor(Math.random() * candidates.length)];
                      s.targetFacility = task.id;

                      if (task.fac.type === 'store') {
                          let sideX = task.fac.gx - 0.5;
                          if (task.fac.gx <= 1) sideX = task.fac.gx + task.fac.gw + 0.5;
                          const sideY = task.fac.gy + task.fac.gh / 2;

                          if (s.boxes === 0) {
                              const targetX = dzX + 1.5; 
                              const targetY = dzY; 
                              s.path = getPath(s.x, s.y, targetX, targetY, eEntrance.gx + 1.1, baseRows, eRows);
                              s.state = 'FETCH_BOXES_MOVE';
                          } else {
                              s.path = getPath(s.x, s.y, sideX, sideY, eEntrance.gx + 1.1, baseRows, eRows);
                              s.state = 'RESTOCK_MOVE';
                          }
                      } else {
                          const targetX = task.fac.gx + task.fac.gw / 2; 
                          const targetY = task.fac.gy - 1.0; 
                          s.path = getPath(s.x, s.y, targetX, targetY, eEntrance.gx + 1.1, baseRows, eRows);
                          s.state = 'REG_MOVE';
                      }
                   } else {
                      s.timer = 1.0;
                      if (Math.random() < 0.3) {
                         const targetX = Math.max(1.5, Math.min(eCols - 1.5, s.x + (Math.random()*6 - 3)));
                         const targetY = Math.max(1.5, Math.min(eRows - 1.5, s.y + (Math.random()*6 - 3)));
                         s.path = getPath(s.x, s.y, targetX, targetY, eEntrance.gx + 1.1, baseRows, eRows);
                         s.state = 'WANDERING_MOVE';
                      }
                   }
                }
             } else if (s.state === 'WANDERING_MOVE') {
                if (!moveEntity(s)) { s.state = 'IDLE'; s.timer = 1.0; }
             } else if (s.state === 'FETCH_BOXES_MOVE') {
                if (!moveEntity(s)) { 
                    if (state.supplies > 0) {
                        s.state = 'PICKING_BOXES'; s.timer = 1.5; 
                    } else {
                        s.state = 'IDLE'; s.timer = 2.0; 
                    }
                }
             } else if (s.state === 'PICKING_BOXES') {
                s.timer -= dt;
                if (s.timer <= 0) { 
                    const taken = Math.min(s.maxBoxes, state.supplies);
                    if (taken > 0) {
                        s.boxes = taken; 
                        state.supplies -= taken;
                        s.state = 'IDLE'; s.timer = 0.1; 
                    } else {
                        s.state = 'IDLE'; s.timer = 2.0;
                    }
                }
             } else if (s.state === 'RESTOCK_MOVE') {
                if (!moveEntity(s)) { s.state = 'WORKING_RESTOCK'; s.timer = 1.0; }
             } else if (s.state === 'WORKING_RESTOCK') {
                s.timer -= dt;
                if (s.timer <= 0) {
                   const fac = map.facilities[s.targetFacility];
                   const sim = getSim(mIdx, s.targetFacility);
                   const maxStock = Math.floor(fac.gh * 2.5) + facLevels[s.targetFacility] * 10;
                   sim.stock = Math.min(maxStock, sim.stock + s.boxes * 15);
                   s.boxes = 0;
                   const basePos = getBaseIso(map, fac.gx + fac.gw/2, fac.gy + fac.gh/2, 60);
                   state.floatingTexts.push({ bx: basePos.x, by: basePos.y, text: "Restocked!", color: '#3b82f6', life: 1.0 });
                   s.targetFacility = null; s.state = 'IDLE'; s.timer = 0.5;
                }
             } else if (s.state === 'REG_MOVE') {
                if (!moveEntity(s)) { s.state = 'WORKING_REG'; s.timer = 1.0; }
             } else if (s.state === 'WORKING_REG') {
                s.timer -= dt;
                if (s.timer <= 0) {
                   const sim = getSim(mIdx, s.targetFacility);
                   if (sim.cash > 0) {
                      cashCollectedThisFrame += sim.cash;
                      SOUNDS.coin(); 
                      const basePos = getBaseIso(map, map.facilities[s.targetFacility].gx + map.facilities[s.targetFacility].gw/2, map.facilities[s.targetFacility].gy + map.facilities[s.targetFacility].gh/2, 60);
                      state.floatingTexts.push({ bx: basePos.x, by: basePos.y, text: `+$${sim.cash}`, color: '#4ade80', life: 1.2 });
                      sim.cash = 0;
                   }
                   s.targetFacility = null; s.state = 'IDLE'; s.timer = 0.5;
                }
             }
          }

          if (cashCollectedThisFrame > 0) addMoney(cashCollectedThisFrame);
          if (moneySpentThisFrame > 0) setMoney(prev => prev - moneySpentThisFrame);

          const unlockedStores = Object.keys(facLevels).filter(id => facLevels[id] > 0 && map.facilities[id].type === 'store');
          
          if (isStoreOpen && unlockedStores.length > 0 && state.npcs.length < 10 + (unlockedStores.length * 5)) {
            if (Math.random() < 0.04 * Math.sqrt(attrMult)) {
              const numItems = Math.floor(Math.random() * Math.min(3, unlockedStores.length)) + 1;
              const shoppingList = [...unlockedStores].sort(() => 0.5 - Math.random()).slice(0, numItems);
              const firstTarget = shoppingList.shift();
              
              const store = map.facilities[firstTarget];
              const hairColors = ['#fcd34d', '#78350f', '#0f172a', '#dc2626', '#d97706', '#9333ea'];
              
              const isShoplifter = Math.random() < 0.08; 
              
              const spawnX = eEntrance.gx + (Math.random()*1.5);
              const spawnY = eEntrance.gy + 5.5; 
              
              let destX = store.gx - 0.8;
              if (store.gx < 2) destX = store.gx + store.gw + 0.8;
              const destY = store.gy + 1 + Math.random()*(store.gh-2);

              state.npcs.push({
                id: Math.random(),
                isShoplifter,
                x: spawnX, y: spawnY, 
                speed: (isShoplifter ? 2.5 : 1.5) + Math.random() * 0.8,
                color: isShoplifter ? '#334155' : `hsl(${Math.random() * 360}, 80%, 65%)`,
                hair: isShoplifter ? '#020617' : hairColors[Math.floor(Math.random() * hairColors.length)],
                state: 'SHOPPING_MOVE', targetFacility: firstTarget, shoppingList: shoppingList,
                path: getPath(spawnX, spawnY, destX, destY, eEntrance.gx + 1.1, baseRows, eRows),
                timer: 0, cartValue: 0, wobble: Math.random() * Math.PI * 2, moveTimeout: 0
              });
            }
          }

          for (let i = state.npcs.length - 1; i >= 0; i--) {
            const npc = state.npcs[i];
            
            if (npc.state.includes('MOVE')) {
                npc.moveTimeout += dt;
                if (npc.moveTimeout > 25.0 * attrMult) { 
                    npc.state = 'LEAVING_MOVE';
                    const destX = eEntrance.gx + (Math.random()*1.5); const destY = eEntrance.gy + 6.5; 
                    npc.path = getPath(npc.x, npc.y, destX, destY, eEntrance.gx + 1.1, baseRows, eRows);
                    npc.moveTimeout = 0;
                }
            } else {
                npc.moveTimeout = 0;
            }

            const isMoving = moveEntity(npc);

            if ((npc.state === 'SHOPPING_MOVE' || npc.state === 'REG_MOVE') && Math.random() < 0.02 * dt) {
                state.trash.push({ x: npc.x, y: npc.y, progress: 0 });
            }

            if (npc.isShoplifter && npc.state === 'FLEEING_MOVE') {
                let caught = false;
                
                // Player catch
                if (getDistance(player.x, player.y, npc.x, npc.y) < 1.5) caught = true;
                
                // Guard catch
                if (!caught) {
                    for (const g of state.guards) {
                        if (getDistance(g.x, g.y, npc.x, npc.y) <= g.catchRadius) {
                            caught = true;
                            const gPos = getBaseIso(map, g.x, g.y, 60);
                            state.floatingTexts.push({ bx: gPos.x, by: gPos.y, text: "Gotcha!", color: '#3b82f6', life: 1.0 });
                            break;
                        }
                    }
                }
                
                if (caught) {
                    addMoney(50);
                    SOUNDS.coin(); 
                    const bPos = getBaseIso(map, npc.x, npc.y, 45);
                    state.floatingTexts.push({ bx: bPos.x, by: bPos.y, text: "Busted! +$50", color: '#4ade80', life: 1.5 });
                    state.npcs.splice(i, 1);
                    continue; 
                }
            }

            if (!isMoving) {
              if (npc.state === 'SHOPPING_MOVE') {
                 npc.state = 'SHOPPING_WAIT'; npc.timer = 0;
              }
              else if (npc.state === 'SHOPPING_WAIT') {
                const storeSim = getSim(mIdx, npc.targetFacility);
                
                if (storeSim.stock <= 0) {
                   npc.timer += dt;
                   if (npc.timer > 1.0 * attrMult) {
                     const basePos = getBaseIso(map, npc.x, npc.y, 45);
                     state.floatingTexts.push({ bx: basePos.x, by: basePos.y, text: "😠 Empty Shelves!", color: '#ef4444', life: 1.0 });
                     npc.state = 'LEAVING_MOVE';
                     const destX = eEntrance.gx + (Math.random()*1.5); const destY = eEntrance.gy + 6.5; 
                     npc.path = getPath(npc.x, npc.y, destX, destY, eEntrance.gx + 1.1, baseRows, eRows);
                   }
                } else {
                   npc.timer += dt;
                   const lvl = facLevels[npc.targetFacility];
                   const serveTime = (map.facilities[npc.targetFacility].baseTimeMs / 1000) * Math.pow(0.95, lvl - 1);
                   
                   if (npc.timer >= serveTime) {
                      storeSim.stock--; 
                      
                      if (npc.isShoplifter) {
                          const basePos = getBaseIso(map, npc.x, npc.y, 45);
                          state.floatingTexts.push({ bx: basePos.x, by: basePos.y, text: "🏃 Shoplifter!", color: '#ef4444', life: 1.5 });
                          npc.state = 'FLEEING_MOVE';
                          npc.speed *= 1.4; 
                          const destX = eEntrance.gx + (Math.random()*1.5); const destY = eEntrance.gy + 6.5; 
                          npc.path = getPath(npc.x, npc.y, destX, destY, eEntrance.gx + 1.1, baseRows, eRows);
                      } else {
                          npc.cartValue += map.facilities[npc.targetFacility].baseRev * lvl; 
                          
                          if (npc.shoppingList.length > 0) {
                             npc.targetFacility = npc.shoppingList.shift();
                             const nextStore = map.facilities[npc.targetFacility];
                             let destX = nextStore.gx - 0.8;
                             if (nextStore.gx < 2) destX = nextStore.gx + nextStore.gw + 0.8;
                             const destY = nextStore.gy + 1 + Math.random()*(nextStore.gh-2);
                             npc.path = getPath(npc.x, npc.y, destX, destY, eEntrance.gx + 1.1, baseRows, eRows);
                             npc.state = 'SHOPPING_MOVE'; 
                          } else {
                             const unlockedRegs = Object.keys(facLevels).filter(id => facLevels[id] > 0 && map.facilities[id].type === 'register');
                             if (unlockedRegs.length > 0) {
                               npc.targetFacility = unlockedRegs[Math.floor(Math.random() * unlockedRegs.length)];
                               const reg = map.facilities[npc.targetFacility];
                               const destX = reg.gx + reg.gw / 2; 
                               const destY = reg.gy - 1.0; 
                               npc.path = getPath(npc.x, npc.y, destX, destY, eEntrance.gx + 1.1, baseRows, eRows);
                               npc.state = 'REG_MOVE';
                             } else {
                               addMoney(npc.cartValue); npc.state = 'LEAVING_MOVE';
                               const destX = eEntrance.gx + (Math.random()*1.5); const destY = eEntrance.gy + 6.5; 
                               npc.path = getPath(npc.x, npc.y, destX, destY, eEntrance.gx + 1.1, baseRows, eRows);
                             }
                          }
                      }
                   }
                }
              }
              else if (npc.state === 'REG_MOVE') {
                npc.state = 'REG_WAIT'; npc.timer = 0;
              }
              else if (npc.state === 'REG_WAIT') {
                npc.timer += dt;
                const lvl = facLevels[npc.targetFacility];
                const checkoutTime = (map.facilities[npc.targetFacility].baseTimeMs / 1000) * Math.pow(0.85, lvl - 1);
                
                if (!isStoreOpen && npc.timer > checkoutTime * 1.5) {
                   npc.cartValue = 0; npc.state = 'LEAVING_MOVE';
                   const destX = eEntrance.gx + (Math.random()*1.5); const destY = eEntrance.gy + 6.5; 
                   npc.path = getPath(npc.x, npc.y, destX, destY, eEntrance.gx + 1.1, baseRows, eRows);
                } else if (npc.timer >= checkoutTime) {
                   const finalValue = Math.floor(npc.cartValue * (1 + curCharismaLvl * 0.1));
                   getSim(mIdx, npc.targetFacility).cash += finalValue; 
                   SOUNDS.coin(); 
                   
                   npc.cartValue = 0; npc.state = 'LEAVING_MOVE';
                   const destX = eEntrance.gx + (Math.random()*1.5); const destY = eEntrance.gy + 6.5; 
                   npc.path = getPath(npc.x, npc.y, destX, destY, eEntrance.gx + 1.1, baseRows, eRows);

                   if (Math.random() < 0.05) {
                       const droppedGems = Math.floor(Math.random() * 2) + 1;
                       addGems(droppedGems);
                       const bPos = getBaseIso(map, npc.x, npc.y, 60);
                       state.floatingTexts.push({ bx: bPos.x, by: bPos.y, text: `+${droppedGems} 💎`, color: '#c084fc', life: 1.5 });
                   }
                }
              }
              else if (npc.state === 'LEAVING_MOVE' || npc.state === 'FLEEING_MOVE') { 
                if (npc.state === 'FLEEING_MOVE') {
                   const basePos = getBaseIso(map, npc.x, npc.y, 45);
                   state.floatingTexts.push({ bx: basePos.x, by: basePos.y, text: "Escaped!", color: '#ef4444', life: 1.0 });
                }
                state.npcs.splice(i, 1); 
              }
            }
          }

          for (let i = state.floatingTexts.length - 1; i >= 0; i--) {
            state.floatingTexts[i].by -= 35 * dt; 
            state.floatingTexts[i].life -= dt;
            if (state.floatingTexts[i].life <= 0) state.floatingTexts.splice(i, 1);
          }
          for (let i = state.particles.length - 1; i >= 0; i--) {
            state.particles[i].bx += state.particles[i].vx * dt; 
            state.particles[i].by += state.particles[i].vy * dt;
            state.particles[i].vy += 600 * dt; 
            state.particles[i].life -= dt * 1.0;
            if (state.particles[i].life <= 0) state.particles.splice(i, 1);
          }
        };

        const drawPrism = (ctx, map, gx, gy, z, gw, gh, depth, colors, isWireframe = false) => {
           const camX = gameState.current.camera.x;
           const camY = gameState.current.camera.y;

           const p1 = toIso(map, gx, gy, z + depth, camX, camY); 
           const p2 = toIso(map, gx + gw, gy, z + depth, camX, camY); 
           const p3 = toIso(map, gx + gw, gy + gh, z + depth, camX, camY); 
           const p4 = toIso(map, gx, gy + gh, z + depth, camX, camY); 

           const b2 = toIso(map, gx + gw, gy, z, camX, camY); 
           const b3 = toIso(map, gx + gw, gy + gh, z, camX, camY); 
           const b4 = toIso(map, gx, gy + gh, z, camX, camY); 

           if (isWireframe) {
             ctx.strokeStyle = colors.top; ctx.setLineDash([6, 6]); ctx.lineWidth = 3;
             ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); ctx.closePath(); ctx.stroke();
             ctx.setLineDash([]); return;
           }

           if (z === 0) { 
             const s1 = toIso(map, gx-0.1, gy-0.1, 0, camX, camY); const s2 = toIso(map, gx+gw+0.2, gy-0.1, 0, camX, camY);
             const s3 = toIso(map, gx+gw+0.2, gy+gh+0.2, 0, camX, camY); const s4 = toIso(map, gx-0.1, gy+gh+0.2, 0, camX, camY);
             ctx.fillStyle = 'rgba(0,0,0,0.1)';
             ctx.beginPath(); ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y); ctx.lineTo(s3.x, s3.y); ctx.lineTo(s4.x, s4.y); ctx.closePath(); ctx.fill();
           }

           ctx.fillStyle = colors.top; ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); ctx.closePath(); ctx.fill();
           ctx.fillStyle = colors.left; ctx.beginPath(); ctx.moveTo(p4.x, p4.y); ctx.lineTo(p3.x, p3.y); ctx.lineTo(b3.x, b3.y); ctx.lineTo(b4.x, b4.y); ctx.closePath(); ctx.fill();
           ctx.fillStyle = colors.right; ctx.beginPath(); ctx.moveTo(p3.x, p3.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(b2.x, b2.y); ctx.lineTo(b3.x, b3.y); ctx.closePath(); ctx.fill();
           
           ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5;
           ctx.beginPath(); ctx.moveTo(p4.x, p4.y); ctx.lineTo(p3.x, p3.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
        };

        const drawCharacter = (ctx, map, char, baseColor, isPlayer = false, isStaff = false, isGuard = false) => {
            const camX = gameState.current.camera.x;
            const camY = gameState.current.camera.y;
            
            const pScale = (1 + Math.sin(char.wobble) * 0.08) * (map.tileW / 60); 
            const jump = Math.abs(Math.sin(char.wobble)) * 7;
            const pos = toIso(map, char.x, char.y, jump, camX, camY);
            
            const shadow = toIso(map, char.x, char.y, 0, camX, camY);
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.beginPath(); ctx.ellipse(shadow.x, shadow.y, 14 * pScale, 7 * pScale, 0, 0, Math.PI*2); ctx.fill();

            ctx.save(); ctx.translate(pos.x, pos.y); ctx.scale(pScale, pScale);

            if (char.boxes && char.boxes > 0) {
               ctx.fillStyle = '#d97706'; 
               ctx.strokeStyle = '#92400e';
               for(let i=0; i<char.boxes; i++) {
                   ctx.fillRect(-7, -29 - i*9, 14, 8);
                   ctx.strokeRect(-7, -29 - i*9, 14, 8);
               }
            }

            if (char.isShoplifter && char.state === 'FLEEING_MOVE') {
                ctx.fillStyle = '#ef4444'; ctx.font = 'bold 24px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText("!", 0, -35 + Math.sin(performance.now()/100)*3);
            }

            ctx.fillStyle = baseColor; ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath(); ctx.arc(0, -10, 9, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.fillRect(-9, -10, 18, 10);
            ctx.beginPath(); ctx.moveTo(-9, -10); ctx.lineTo(-9, 0); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(9, -10); ctx.lineTo(9, 0); ctx.stroke();
            
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.beginPath(); ctx.ellipse(0, 0, 9, 4.5, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();

            ctx.fillStyle = '#fef08a';
